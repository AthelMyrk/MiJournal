<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="MurmurTether"/>
<meta name="theme-color" content="#0a0a0a"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><radialGradient id='c' cx='40%25' cy='35%25' r='65%25'><stop offset='0%25' stop-color='%23ffffff'/><stop offset='40%25' stop-color='%23e8e4f0'/><stop offset='100%25' stop-color='%237080a0'/></radialGradient></defs><circle cx='16' cy='16' r='11.5' fill='none' stroke='%23e8e4f0' stroke-width='0.8' opacity='0.4'/><circle cx='16' cy='16' r='8.5' fill='none' stroke='%23e8e4f0' stroke-width='1.1' opacity='0.6'/><circle cx='16' cy='16' r='5.5' fill='none' stroke='%23e8e4f0' stroke-width='1.3' opacity='0.85'/><circle cx='16' cy='16' r='3' fill='url(%23c)'/></svg>"/>
<title>MurmurTether</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Lora:ital@0;1&family=DM+Mono&family=Caveat:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ═══════════════════════════════════════════════════════════
   MurmurTether — Y2K elegante
   ═══════════════════════════════════════════════════════════ */

:root{
  --glass-n-bg: rgba(14,18,28,0.55);
  --glass-n-bg-strong: rgba(14,18,28,0.78);
  --glass-n-border: rgba(255,255,255,0.10);
  --glass-n-highlight: rgba(255,255,255,0.18);
  --glass-n-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.06) inset;
  --text-n: rgba(232,232,236,0.92);
  --text-n-soft: rgba(232,232,236,0.55);
  --text-n-faint: rgba(232,232,236,0.32);
  --glass-d-bg: rgba(255,255,255,0.42);
  --glass-d-bg-strong: rgba(252,250,245,0.82);
  --glass-d-border: rgba(255,255,255,0.55);
  --glass-d-highlight: rgba(255,255,255,0.85);
  --glass-d-shadow: 0 8px 32px rgba(40,60,80,0.18), 0 1px 0 rgba(255,255,255,0.6) inset;
  --text-d: rgba(28,32,40,0.88);
  --text-d-soft: rgba(28,32,40,0.5);
  --text-d-faint: rgba(28,32,40,0.3);
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-soft: cubic-bezier(0.4, 0.0, 0.2, 1);
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;width:100%;overflow:hidden;-webkit-tap-highlight-color:transparent;}
body{font-family:'Space Grotesk',system-ui,sans-serif;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}

@keyframes fadeIn{from{opacity:0;transform:scale(.96) translateY(4px);}to{opacity:1;transform:scale(1) translateY(0);}}
@keyframes flicker{0%,100%{opacity:.55;transform:scale(1);}50%{opacity:1;transform:scale(1.08);}}
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.02);}}
@keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}

.el-in{animation:fadeIn .5s var(--ease-out-expo) forwards;}

input[type=range]{-webkit-appearance:none;height:3px;border-radius:2px;outline:none;cursor:pointer;background:rgba(255,255,255,0.15);}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;cursor:pointer;background:#e8e8ec;box-shadow:0 0 0 1px rgba(0,0,0,.15),0 2px 6px rgba(0,0,0,.3);}
input[type=color]{-webkit-appearance:none;border:none;padding:0;cursor:pointer;border-radius:50%;overflow:hidden;background:none;width:28px;height:28px;}
input[type=color]::-webkit-color-swatch-wrapper{padding:0;}
input[type=color]::-webkit-color-swatch{border:1px solid rgba(255,255,255,.2);border-radius:50%;}
textarea{font-family:inherit;resize:none;outline:none;border:none;background:transparent;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px;}

/* ── Board ── */
.board{position:relative;width:100%;height:100%;overflow:hidden;transition:background .8s var(--ease-soft);}

/* ── Canvas ── */
.canvas-viewport{
  position:absolute;inset:0;overflow:hidden;
  cursor:grab;touch-action:none;z-index:1;
}
.canvas-viewport.panning{cursor:grabbing;}

/* canvas-world: origin en 0,0 del centro del viewport */
.canvas-world{
  position:absolute;
  left:50%;top:50%;
  width:0;height:0;
  transform-origin:0 0;
  will-change:transform;
  overflow:visible;
}

/* ── Zoom indicator ── */
.zoom-indicator{
  position:absolute;bottom:max(28px,calc(env(safe-area-inset-bottom) + 16px));
  right:18px;z-index:50;
  display:flex;align-items:center;gap:6px;
  padding:6px 8px;border-radius:11px;
  background:var(--glass-n-bg);
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  border:1px solid var(--glass-n-border);
  box-shadow:0 4px 12px rgba(0,0,0,.3),0 1px 0 rgba(255,255,255,0.08) inset;
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--text-n-soft);letter-spacing:.05em;
  pointer-events:auto;
}
.zoom-indicator::before{
  content:'';position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.16) 50%,transparent);
  pointer-events:none;
}
.zoom-indicator.light{background:var(--glass-d-bg);border-color:var(--glass-d-border);color:var(--text-d-soft);}
.zoom-indicator button{
  background:none;border:none;color:inherit;cursor:pointer;
  width:22px;height:22px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s var(--ease-soft);
}
.zoom-indicator button:hover{background:rgba(255,255,255,.1);color:var(--text-n);}
.zoom-indicator.light button:hover{background:rgba(20,30,50,.08);color:var(--text-d);}
.zoom-value{min-width:42px;text-align:center;}

/* ── Center button ── */
.center-btn{
  position:absolute;bottom:max(28px,calc(env(safe-area-inset-bottom) + 16px));
  left:18px;z-index:50;
  width:36px;height:36px;border-radius:11px;
  background:var(--glass-n-bg);
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  border:1px solid var(--glass-n-border);
  color:var(--text-n);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,0,0,.3),0 1px 0 rgba(255,255,255,0.08) inset;
  transition:all .25s var(--ease-soft);
}
.center-btn::before{
  content:'';position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18) 50%,transparent);
  pointer-events:none;border-radius:11px 11px 0 0;
}
.center-btn:hover{background:rgba(30,40,60,0.7);transform:translateY(-1px);}
.center-btn.light{background:var(--glass-d-bg);border-color:var(--glass-d-border);color:var(--text-d);}
.center-btn.light:hover{background:rgba(255,255,255,.65);}

/* ── Background ── */
.bgsvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}

/* ── Board Elements ── */
.board-el{position:absolute;cursor:grab;user-select:none;transition:filter .3s var(--ease-soft);}
.board-el:hover{filter:brightness(1.03);z-index:100 !important;}
.board-el:active{cursor:grabbing;}

.del-btn{
  position:absolute;top:-10px;right:-10px;width:24px;height:24px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.4);cursor:pointer;
  display:none;align-items:center;justify-content:center;z-index:10;
  background:rgba(220,60,80,0.95);color:#fff;
  box-shadow:0 4px 12px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.1) inset;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:transform .2s var(--ease-soft);
}
.del-btn:hover{transform:scale(1.12);}
.board-el:hover .del-btn{display:flex;}

.resize-handle{
  position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;cursor:se-resize;
  opacity:0;transition:opacity .25s var(--ease-soft);
}
.board-el:hover .resize-handle{opacity:.6;}
.resize-handle::after{
  content:'';position:absolute;bottom:4px;right:4px;width:8px;height:8px;
  border-right:1.5px solid currentColor;border-bottom:1.5px solid currentColor;
}

/* ── Postit ── */
.postit{
  border-radius:2px;padding:18px 18px 14px;min-width:130px;position:relative;
  box-shadow:0 1px 1px rgba(0,0,0,0.08),0 4px 8px rgba(0,0,0,0.10),0 12px 24px rgba(0,0,0,0.14),0 1px 0 rgba(255,255,255,0.6) inset;
}
.postit::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,rgba(0,0,0,0.04) 0%,rgba(255,255,255,0.5) 30%,rgba(255,255,255,0.5) 70%,rgba(0,0,0,0.04) 100%);
}
.postit::after{content:'';position:absolute;top:0;right:0;width:18px;height:18px;background:linear-gradient(225deg,rgba(0,0,0,0.06) 0%,rgba(0,0,0,0) 50%);pointer-events:none;}
.postit-author{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;opacity:.42;margin-bottom:10px;letter-spacing:.02em;}
.postit-text{font-size:14px;line-height:1.6;word-break:break-word;}
.postit-time{font-family:'DM Mono',monospace;font-size:10px;opacity:.42;margin-top:10px;text-align:right;letter-spacing:.05em;font-weight:500;}

/* ── Sketch ── */
.sketch{
  background:#fafaf6;border-radius:2px;position:relative;overflow:hidden;
  box-shadow:0 1px 1px rgba(0,0,0,0.08),0 4px 10px rgba(0,0,0,0.12),0 14px 28px rgba(0,0,0,0.15);
}
.sketch.dark-sheet{background:#1a1c20;}
.sketch::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle at 20% 30%,rgba(0,0,0,0.025) 0%,transparent 40%),radial-gradient(circle at 80% 70%,rgba(0,0,0,0.02) 0%,transparent 40%);}
.sketch-author{position:absolute;top:8px;left:12px;font-size:11px;opacity:.5;pointer-events:none;font-family:'Cormorant Garamond',serif;font-style:italic;}
.sketch-time{position:absolute;bottom:8px;right:12px;font-size:10.5px;opacity:.5;pointer-events:none;font-family:'DM Mono',monospace;letter-spacing:.05em;font-weight:500;text-shadow:0 1px 2px rgba(0,0,0,0.3);}
.sketch:not(.dark-sheet) .sketch-time{text-shadow:0 1px 2px rgba(255,255,255,0.6);}
.sketch img{display:block;width:100%;height:100%;}

/* ── Polaroid ── */
.polaroid{
  background:#fdfcf7;border-radius:2px;display:flex;flex-direction:column;padding:10px 10px 0;
  box-shadow:0 1px 2px rgba(0,0,0,0.10),0 6px 14px rgba(0,0,0,0.14),0 18px 36px rgba(0,0,0,0.18),0 1px 0 rgba(255,255,255,0.9) inset;
}
.polaroid-img{flex:1;overflow:hidden;background:#000;box-shadow:0 0 0 1px rgba(0,0,0,0.08) inset;}
.polaroid-img img{width:100%;height:100%;object-fit:cover;display:block;}
.polaroid-foot{padding:10px 4px 14px;background:transparent;}
.polaroid-caption{font-family:'Caveat',cursive;font-size:15px;color:#2a2a2a;text-align:center;border:none;outline:none;width:100%;background:transparent;}
.polaroid-caption::placeholder{color:#bbb;}
.polaroid-meta{font-family:'DM Mono',monospace;font-size:10px;color:#777;text-align:right;margin-top:6px;letter-spacing:.06em;font-weight:500;}

/* ── Glass ── */
.glass{
  background:var(--glass-n-bg);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--glass-n-border);
  box-shadow:var(--glass-n-shadow);
  position:relative;
}
.glass::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,var(--glass-n-highlight) 50%,transparent);pointer-events:none;}
.glass.light{background:var(--glass-d-bg);border-color:var(--glass-d-border);box-shadow:var(--glass-d-shadow);}
.glass.light::before{background:linear-gradient(90deg,transparent,var(--glass-d-highlight) 50%,transparent);}
.glass-strong{background:var(--glass-n-bg-strong);}
.glass-strong.light{background:var(--glass-d-bg-strong);}

/* ── Header ── */
.header{
  position:absolute;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;padding-top:max(14px,env(safe-area-inset-top));
  pointer-events:none;
}
.header > *{pointer-events:auto;}
.header-mark{width:32px;height:32px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 1px 8px rgba(0,0,0,0.4)) drop-shadow(0 0 16px rgba(180,200,240,0.15));animation:breathe 6s ease-in-out infinite;}
.header-mark-svg{width:32px;height:32px;color:#e8e4f0;}
.board[data-light="true"] .header-mark-svg{color:#1a2840;}
.board[data-light="true"] .header-mark{filter:drop-shadow(0 1px 8px rgba(255,255,255,0.5)) drop-shadow(0 0 12px rgba(100,120,160,0.2));}
.header-actions{display:flex;gap:8px;align-items:center;}

.hbtn{
  height:34px;min-width:34px;padding:0 12px;border-radius:11px;
  font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;
  display:flex;align-items:center;justify-content:center;gap:6px;
  background:var(--glass-n-bg);backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);
  border:1px solid var(--glass-n-border);color:var(--text-n);
  box-shadow:0 2px 8px rgba(0,0,0,.25),0 1px 0 rgba(255,255,255,0.08) inset;
  transition:all .25s var(--ease-soft);position:relative;
}
.hbtn::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18) 50%,transparent);pointer-events:none;border-radius:11px 11px 0 0;}
.hbtn:hover{background:rgba(30,40,60,0.7);transform:translateY(-1px);}
.hbtn.active{background:rgba(255,255,255,.18);color:#fff;}
.hbtn.light{background:var(--glass-d-bg);border-color:var(--glass-d-border);color:var(--text-d);}
.hbtn.light:hover{background:rgba(255,255,255,.65);}
.hbtn.light.active{background:rgba(20,30,50,.12);color:rgba(20,30,50,.9);}

.hbtn-group{
  display:flex;border-radius:11px;overflow:hidden;
  border:1px solid var(--glass-n-border);background:var(--glass-n-bg);
  backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);
  box-shadow:0 2px 8px rgba(0,0,0,.25),0 1px 0 rgba(255,255,255,0.08) inset;position:relative;
}
.hbtn-group::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18) 50%,transparent);pointer-events:none;}
.hbtn-group.light{background:var(--glass-d-bg);border-color:var(--glass-d-border);}
.hbtn-group .hbtn{border:none;border-radius:0;background:transparent;box-shadow:none;height:34px;width:38px;padding:0;}
.hbtn-group .hbtn::before{display:none;}
.hbtn-group .hbtn.active{background:rgba(255,255,255,.16);}
.hbtn-group.light .hbtn.active{background:rgba(20,30,50,.10);}

.icon{width:14px;height:14px;stroke-width:1.5;stroke:currentColor;fill:none;flex-shrink:0;}
.icon-sm{width:12px;height:12px;}
.icon-lg{width:18px;height:18px;}

/* ── Daynav ── */
.daynav{
  position:absolute;top:max(60px,calc(env(safe-area-inset-top) + 60px));
  left:50%;transform:translateX(-50%);z-index:50;
  display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:13px;
  background:var(--glass-n-bg);backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);
  border:1px solid var(--glass-n-border);box-shadow:0 4px 12px rgba(0,0,0,.3),0 1px 0 rgba(255,255,255,0.08) inset;
}
.daynav::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.16) 50%,transparent);pointer-events:none;}
.daynav.light{background:var(--glass-d-bg);border-color:var(--glass-d-border);}
.daynav .day-label{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:14px;color:var(--text-n);min-width:130px;text-align:center;letter-spacing:.02em;}
.daynav.light .day-label{color:var(--text-d);}
.daynav button{background:none;border:none;color:var(--text-n-soft);cursor:pointer;width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all .2s var(--ease-soft);}
.daynav button:hover:not(:disabled){background:rgba(255,255,255,.1);color:var(--text-n);}
.daynav button:disabled{opacity:.25;cursor:default;}
.daynav.light button{color:var(--text-d-soft);}
.daynav.light button:hover:not(:disabled){background:rgba(20,30,50,.08);color:var(--text-d);}

/* ── Toolbar ── */
.toolbar{
  position:absolute;bottom:max(28px,calc(env(safe-area-inset-bottom) + 16px));
  left:50%;transform:translateX(-50%);z-index:50;
  display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:18px;
  background:var(--glass-n-bg-strong);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid var(--glass-n-border);
  box-shadow:0 12px 32px rgba(0,0,0,.4),0 1px 0 rgba(255,255,255,.12) inset,0 -1px 0 rgba(0,0,0,.2) inset;
}
.toolbar::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22) 50%,transparent);pointer-events:none;border-radius:18px 18px 0 0;}
.toolbar.light{background:var(--glass-d-bg-strong);border-color:var(--glass-d-border);}
.tbtn{
  width:42px;height:42px;border-radius:13px;border:1px solid rgba(255,255,255,.1);background:transparent;
  color:var(--text-n);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .25s var(--ease-soft);font-family:inherit;position:relative;
}
.tbtn:hover{background:rgba(255,255,255,.12);transform:translateY(-2px);}
.tbtn.active{background:rgba(255,255,255,.16);}
.toolbar.light .tbtn{color:var(--text-d);border-color:rgba(20,30,50,.08);}
.toolbar.light .tbtn:hover{background:rgba(20,30,50,.06);}
.tbtn-label{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:13px;color:var(--text-n-soft);padding:0 8px 0 4px;letter-spacing:.02em;}
.toolbar.light .tbtn-label{color:var(--text-d-soft);}

/* ── Modals ── */
.overlay{
  position:fixed;inset:0;z-index:9999;
  display:flex;align-items:flex-start;justify-content:center;
  padding:20px;padding-top:max(20px,env(safe-area-inset-top));
  background:rgba(6,8,12,0.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  animation:overlayIn .35s var(--ease-soft);isolation:isolate;
}
body:has(.overlay) .board-el:hover{z-index:auto !important;}
.modal{
  background:rgba(18,22,32,0.92);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);
  border:1px solid rgba(255,255,255,0.12);border-radius:22px;padding:22px;width:100%;max-width:440px;
  display:flex;flex-direction:column;gap:16px;margin:auto 0;
  box-shadow:0 24px 64px rgba(0,0,0,.55),0 1px 0 rgba(255,255,255,.14) inset,0 -1px 0 rgba(0,0,0,.3) inset;
  position:relative;animation:modalIn .4s var(--ease-out-expo);
}
.modal::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25) 50%,transparent);pointer-events:none;border-radius:22px 22px 0 0;}

const applyY2K=(canvas,src)=>new Promise(res=>{
  const img=new Image();
  img.onload=()=>{
    const W=310,H=Math.round(310*(img.height/img.width));
    canvas.width=W;canvas.height=H;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(img,0,0,W,H);
    const id=ctx.getImageData(0,0,W,H);const d=id.data;
    for(let i=0;i<d.length;i+=4){
      d[i]=Math.min(255,d[i]*.88+18);d[i+1]=Math.min(255,d[i+1]*.95+14);d[i+2]=Math.min(255,d[i+2]*1.07+10);
      const n=(Math.random()-.5)*28;d[i]+=n;d[i+1]+=n;d[i+2]+=n;
    }
    ctx.putImageData(id,0,0);
    const vg=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,H*.75);
    vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.38)');
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(0,0,0,.04)';for(let y=0;y<H;y+=2)ctx.fillRect(0,y,W,1);
    ctx.fillStyle='rgba(255,200,50,.8)';ctx.font='bold 10px monospace';
    const now=new Date();ctx.fillText(`${String(now.getMonth()+1).padStart(2,'0')}/${now.getDate()}/${now.getFullYear()}`,W-76,H-8);
    res(canvas.toDataURL('image/jpeg',.72));
  };
  img.src=src;
});

// ═══════════════════════════════════════════════════════════
// Draw Modal
// ═══════════════════════════════════════════════════════════
function DrawModal({onSave,onCancel,isDark}){
  const ref=useRef(null);
  const [tool,setTool]=useState('pen');
  const [color,setColor]=useState(isDark?'#e8e8ec':'#1a1a1a');
  const [sz,setSz]=useState(3);
  const drawing=useRef(false);
  const last=useRef(null);

  useEffect(()=>{
    const c=ref.current,ctx=c.getContext('2d');
    ctx.fillStyle=isDark?'#1a1c20':'#fafaf6';
    ctx.fillRect(0,0,c.width,c.height);
  },[]);

  const getPos=(e,c)=>{
    const r=c.getBoundingClientRect();
    const s=e.touches?e.touches[0]:e;
    return{x:(s.clientX-r.left)*(c.width/r.width),y:(s.clientY-r.top)*(c.height/r.height)};
  };
  const spray=(ctx,p)=>{
    ctx.fillStyle=color;
    for(let i=0;i<18;i++){const r=sz*4,x=p.x+(Math.random()-.5)*r*2,y=p.y+(Math.random()-.5)*r*2;if(Math.hypot(x-p.x,y-p.y)<r)ctx.fillRect(x,y,1.5,1.5);}
  };
  const onDown=e=>{e.preventDefault();drawing.current=true;const c=ref.current,p=getPos(e,c);last.current=p;if(tool==='spray')spray(c.getContext('2d'),p);};
  const onMove=e=>{
    if(!drawing.current)return;e.preventDefault();
    const c=ref.current,ctx=c.getContext('2d'),p=getPos(e,c);
    if(tool==='pen'||tool==='eraser'){
      ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);
      ctx.strokeStyle=tool==='eraser'?(isDark?'#1a1c20':'#fafaf6'):color;
      ctx.lineWidth=tool==='eraser'?sz*4:sz;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();last.current=p;
    }else if(tool==='spray'){spray(ctx,p);last.current=p;}
  };
  const onUp=e=>{
    if(!drawing.current)return;e.preventDefault();
    const c=ref.current,ctx=c.getContext('2d'),p=getPos(e,c),l=last.current;
    if(tool==='rect'){ctx.strokeStyle=color;ctx.lineWidth=sz;ctx.strokeRect(l.x,l.y,p.x-l.x,p.y-l.y);}
    else if(tool==='line'){ctx.beginPath();ctx.moveTo(l.x,l.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle=color;ctx.lineWidth=sz;ctx.lineCap='round';ctx.stroke();}
    else if(tool==='circle'){const rx=Math.abs(p.x-l.x)/2,ry=Math.abs(p.y-l.y)/2;ctx.strokeStyle=color;ctx.lineWidth=sz;ctx.beginPath();ctx.ellipse(l.x+(p.x>l.x?rx:-rx),l.y+(p.y>l.y?ry:-ry),rx,ry,0,0,Math.PI*2);ctx.stroke();}
    drawing.current=false;
  };
  const TOOLS=[{id:'pen',I:Icon.Pencil},{id:'eraser',I:Icon.Eraser},{id:'spray',I:Icon.Spray},{id:'line',I:Icon.Line},{id:'rect',I:Icon.Rect},{id:'circle',I:Icon.Circle}];
  return(
    <div className="overlay">
      <div className="modal" style={{maxWidth:540}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <h3>Nueva hoja</h3>
          <button className="modal-close" onClick={onCancel}><Icon.X/></button>
        </div>
        <div className="dtoolbar">
          <div style={{display:'flex',gap:4}}>
            {TOOLS.map(({id,I})=>(
              <button key={id} className={`dtool${tool===id?' active':''}`} onClick={()=>setTool(id)}><I className="icon"/></button>
            ))}
          </div>
          <input type="color" value={color} onChange={e=>setColor(e.target.value)}/>
          <div style={{display:'flex',alignItems:'center',gap:10,flex:1}}>
            <span style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontSize:13,color:'rgba(255,255,255,.5)',whiteSpace:'nowrap'}}>grosor</span>
            <input type="range" min="1" max="18" value={sz} onChange={e=>setSz(+e.target.value)} style={{flex:1}}/>
          </div>
        </div>
        <canvas ref={ref} width={480} height={300}
          style={{width:'100%',borderRadius:10,border:'1px solid rgba(255,255,255,.08)',cursor:tool==='eraser'?'cell':'crosshair',touchAction:'none',display:'block',boxShadow:'inset 0 1px 2px rgba(0,0,0,0.3)'}}
          onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
          onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}/>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="mbtn" onClick={onCancel}>Cancelar</button>
          <button className="mbtn primary" onClick={()=>{
            const c=ref.current;
            const tmp=document.createElement('canvas');
            tmp.width=400;tmp.height=Math.round(400*(c.height/c.width));
            tmp.getContext('2d').drawImage(c,0,0,tmp.width,tmp.height);
            onSave(tmp.toDataURL('image/jpeg',0.78));
          }}>Poner en tablón</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// Board Element
// ═══════════════════════════════════════════════════════════
function BoardEl({el,onMove,onDelete,onUpdateCaption,onPress,scale}){
  const elRef=useRef(null);
  const dragStart=useRef(null);
  const resizeStart=useRef(null);

  const startDrag=useCallback((e)=>{
    if(e.target.closest('.resize-handle')||e.target.closest('.del-btn')||e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    if(e.touches&&e.touches.length>1)return;
    e.preventDefault();
    e.stopPropagation();
    onPress&&onPress(el.id);
    const s=e.touches?e.touches[0]:e;
    dragStart.current={mx:s.clientX,my:s.clientY,ex:el.x,ey:el.y};
    const move=ev=>{
      if(ev.touches&&ev.touches.length>1)return;
      const m=ev.touches?ev.touches[0]:ev;
      const dx=(m.clientX-dragStart.current.mx)/scale;
      const dy=(m.clientY-dragStart.current.my)/scale;
      onMove(el.id,Math.round(dragStart.current.ex+dx),Math.round(dragStart.current.ey+dy));
    };
    const up=()=>{
      document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);
      document.removeEventListener('touchmove',move);document.removeEventListener('touchend',up);
    };
    document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
    document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',up);
  },[el,onMove,scale,onPress]);

  const startResize=useCallback((e)=>{
    e.preventDefault();e.stopPropagation();
    if(e.touches&&e.touches.length>1)return;
    const s=e.touches?e.touches[0]:e;
    resizeStart.current={mx:s.clientX,my:s.clientY,w:el.w||200,h:el.h||200};
    const move=ev=>{
      if(ev.touches&&ev.touches.length>1)return;
      const m=ev.touches?ev.touches[0]:ev;
      const dx=(m.clientX-resizeStart.current.mx)/scale;
      const dy=(m.clientY-resizeStart.current.my)/scale;
      const nw=Math.max(120,resizeStart.current.w+dx),nh=Math.max(100,resizeStart.current.h+dy);
      onMove(el.id,el.x,el.y,nw,nh);
    };
    const up=()=>{document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);document.removeEventListener('touchmove',move);document.removeEventListener('touchend',up);};
    document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
    document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',up);
  },[el,onMove,scale]);

  const rot=el.rot||0;
  const style={left:el.x,top:el.y,transform:`rotate(${rot}deg)`,zIndex:el.z||1};

  if(el.type==='postit'){
    const bgColor=PCOLORS.find(c=>c.id===el.color)?.v||el.color||'#fefcf0';
    const font=FONTS.find(f=>f.id===el.font)||FONTS[4];
    const w=el.w||220;
    const dark=luminance(bgColor)<.55;
    const tc=dark?'rgba(255,255,255,.88)':'rgba(20,20,20,.82)';
    return(
      <div ref={elRef} className="board-el el-in" style={style}
        onMouseDown={startDrag} onTouchStart={startDrag}>
        <button className="del-btn" onClick={()=>onDelete(el.id)}><Icon.X className="icon-sm"/></button>
        <div className="postit" style={{background:bgColor,fontFamily:font.css,width:w,height:el.h||'auto',overflow:'hidden',color:tc}}>
          <div className="postit-author">— {el.author_name}</div>
          <div className="postit-text" style={{fontSize:el.font==='caveat'?'1.15rem':'13.5px',fontStyle:['cormorant','lora'].includes(el.font)?'italic':'normal'}}>{el.content}</div>
          <div className="postit-time">{new Date(el.created_at).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <div className="resize-handle" onMouseDown={startResize} onTouchStart={startResize} style={{color:dark?'rgba(255,255,255,.4)':'rgba(0,0,0,.4)'}}/>
      </div>
    );
  }

  if(el.type==='sketch'){
    const w=el.w||240,h=el.h||180;
    return(
      <div ref={elRef} className="board-el el-in" style={style}
        onMouseDown={startDrag} onTouchStart={startDrag}>
        <button className="del-btn" onClick={()=>onDelete(el.id)}><Icon.X className="icon-sm"/></button>
        <div className={`sketch${getIsDark()?' dark-sheet':''}`} style={{width:w,height:h}}>
          <div className="sketch-author">— {el.author_name}</div>
          <img src={el.content} alt="" style={{objectFit:'contain'}}/>
          <div className="sketch-time">{new Date(el.created_at).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <div className="resize-handle" onMouseDown={startResize} onTouchStart={startResize} style={{color:'rgba(0,0,0,.4)'}}/>
      </div>
    );
  }

  if(el.type==='polaroid'){
    const w=el.w||190,imgH=Math.round(w*.95);
    return(
      <div ref={elRef} className="board-el el-in" style={style}
        onMouseDown={startDrag} onTouchStart={startDrag}>
        <button className="del-btn" onClick={()=>onDelete(el.id)}><Icon.X className="icon-sm"/></button>
        <div className="polaroid" style={{width:w}}>
          <div className="polaroid-img" style={{height:imgH}}>
            <img src={el.content} alt=""/>
          </div>
          <div className="polaroid-foot">
            <input className="polaroid-caption" defaultValue={el.caption||''} placeholder="..."
              onBlur={e=>onUpdateCaption(el.id,e.target.value)}
              onMouseDown={e=>e.stopPropagation()} onTouchStart={e=>e.stopPropagation()}/>
            <div className="polaroid-meta">{el.author_name} · {new Date(el.created_at).toLocaleDateString('es',{day:'numeric',month:'short'})}</div>
          </div>
        </div>
        <div className="resize-handle" onMouseDown={startResize} onTouchStart={startResize} style={{color:'rgba(0,0,0,.3)'}}/>
      </div>
    );
  }
  return null;
}

// Onboarding
// ═══════════════════════════════════════════════════════════
function Onboarding({onDone}){
  const [step,setStep]=useState('choice');
  const [name,setName]=useState('');
  const [code,setCode]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');

  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const room=params.get('room');
    if(room){setCode(room);setStep('join');}
  },[]);

  const create=async()=>{
    if(!name.trim())return setErr('Ponete un apodo primero');
    setLoading(true);setErr('');
    const roomId='mt_'+Math.random().toString(36).slice(2,9);
    const userId='u_'+Math.random().toString(36).slice(2)+Date.now().toString(36);
    const{error}=await sb.from('murmur_rooms').insert({id:roomId,created_by:userId,members:[{id:userId,name:name.trim()}]});
    if(error){setErr('Error al crear sala.');setLoading(false);return;}
    ls.set('userId',userId);ls.set('userName',name.trim());ls.set('roomId',roomId);
    onDone({userId,userName:name.trim(),roomId});
  };

  const join=async()=>{
    if(!name.trim())return setErr('Ponete un apodo primero');
    if(!code.trim())return setErr('Pegá el link o código');
    setLoading(true);setErr('');
    const roomId=code.trim().includes('room=')?new URLSearchParams(code.trim().split('?')[1]).get('room'):code.trim();
    const{data,error}=await sb.from('murmur_rooms').select('*').eq('id',roomId).single();
    if(error||!data){setErr('Sala no encontrada.');setLoading(false);return;}
    const userId='u_'+Math.random().toString(36).slice(2)+Date.now().toString(36);
    await sb.from('murmur_rooms').update({members:[...(data.members||[]),{id:userId,name:name.trim()}]}).eq('id',roomId);
    ls.set('userId',userId);ls.set('userName',name.trim());ls.set('roomId',roomId);
    onDone({userId,userName:name.trim(),roomId});
  };

  const isDark=getIsDark();
  return(
    <div className="onboard" style={{background:isDark?'#03050a':'#cae5f0'}}>
      <OutdoorBg isDark={isDark}/>
      <div className={`ocard${!isDark?' light':''}`}>
        <div className="obrand">
          <div className="obrand-mark"><Icon.Logo className="icon-lg" style={{color:isDark?'#e8e4f0':'#1a2840'}}/></div>
          <div className="otitle">MurmurTether</div>
          <div className="osub">un tablón para los dos</div>
        </div>
        {step==='choice'&&(
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <button className="obtn primary" onClick={()=>setStep('create')}>Crear tablón nuevo</button>
            <button className="obtn" onClick={()=>setStep('join')}>Unirme con un link</button>
          </div>
        )}
        {(step==='create'||step==='join')&&(
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div>
              <label className="olabel">Tu apodo</label>
              <input className="oinput" value={name} onChange={e=>setName(e.target.value)} placeholder="¿cómo te llaman acá?" autoFocus/>
            </div>
            {step==='join'&&(
              <div>
                <label className="olabel">Link de invitación</label>
                <input className="oinput" value={code} onChange={e=>setCode(e.target.value)} placeholder="pegá el link aquí"/>
              </div>
            )}
            {err&&<p className="oerr">{err}</p>}
            <button className="obtn primary" onClick={step==='create'?create:join} disabled={loading} style={{opacity:loading?.6:1}}>
              {loading?'un momento...':(step==='create'?'Crear tablón':'Entrar')}
            </button>
            <button className="oback" onClick={()=>{setStep('choice');setErr('');}}>← volver</button>
          </div>
        )}
      </div>
    </div>
  );
}

const PLANT_COMPONENTS={
  'cactus':PlantCactus,'suculenta':PlantSuculenta,'pothos':PlantPothos,
  'lavanda':PlantLavanda,'monstera':PlantMonstera,'helecho':PlantHelecho,
  'bambú':PlantBambu,'rosa':PlantRosa,'aloe':PlantAloe,'orquídea':PlantOrquidea,
  'lucky bamboo':PlantLuckyBamboo,'girasol':PlantGirasol,'enredadera':PlantEnredadera,
  'bonsái':PlantBonsai,'pino':PlantPino,'cerezo':PlantCerezo,
};

function selectPlant(dateStr,{total,postits,sketches,polaroids,authors}){
  const seed=parseInt(dateStr.replace(/-/g,''),10)%2;
  if(authors>=2&&sketches>0&&polaroids>0&&postits>0)return 'orquídea';
  if(sketches>0&&polaroids>0&&postits>0)return 'monstera';
  if(sketches>0&&polaroids>0)return 'cerezo';
  if(sketches>0)return seed?'lavanda':'helecho';
  if(polaroids>0)return seed?'rosa':'girasol';
  if(postits>=5)return seed?'pothos':'enredadera';
  if(postits>=3)return seed?'suculenta':'aloe';
  if(postits>=1)return seed?'cactus':'lucky bamboo';
  if(total===1)return seed?'bambú':'pino';
  return 'cactus';
}
function calcGrowth(wateredDays){
  if(wateredDays<=0)return 0.18;
  if(wateredDays>=7)return 1.0;
  return 0.18+(wateredDays/7)*0.82;
}

// ═══════════════════════════════════════════════════════════
// Garden component
// ═══════════════════════════════════════════════════════════
function Garden({session,dark}){
  const [days,setDays]=useState(null);
  const [waterings,setWaterings]=useState({});
  const [watering,setWatering]=useState(null);
  const [potSettings,setPotSettings]=useState({});
  const [activePicker,setActivePicker]=useState(null);
  const [loading,setLoading]=useState(true);
  const [page,setPage]=useState(0);
  const [tooltip,setTooltip]=useState(null);
  const [fade,setFade]=useState(true);
  const today=todayStr();
  const ITEMS=9;

  // Cargar notas agrupadas por día
  useEffect(()=>{
    sb.from('murmur_notes')
      .select('created_at,type,author_id,author_name')
      .eq('room_id',session.roomId)
      .then(({data})=>{
        if(!data){setLoading(false);return;}
        const groups={};
        data.forEach(n=>{
          const d=new Date(n.created_at).toLocaleDateString('sv-SE',{timeZone:'America/Santiago'});
          if(!groups[d])groups[d]={date:d,postits:0,sketches:0,polaroids:0,authorSet:new Set(),authorCount:{}};
          if(n.type==='postit')groups[d].postits++;
          if(n.type==='sketch')groups[d].sketches++;
          if(n.type==='polaroid')groups[d].polaroids++;
          groups[d].authorSet.add(n.author_id);
          groups[d].authorCount[n.author_name]=(groups[d].authorCount[n.author_name]||0)+1;
        });
        const todayRaw=groups[today]||{date:today,postits:0,sketches:0,polaroids:0,authorSet:new Set(),authorCount:{}};
        const todayData={
          ...todayRaw,
          authors:todayRaw.authorSet.size,
          total:todayRaw.postits+todayRaw.sketches+todayRaw.polaroids,
          topAuthor:Object.entries(todayRaw.authorCount).sort((a,b)=>b[1]-a[1])[0]?.[0]||'',
          isToday:true,
        };
        const past=Object.values(groups)
          .filter(g=>g.date!==today)
          .sort((a,b)=>b.date.localeCompare(a.date))
          .map(g=>({
            ...g,
            authors:g.authorSet.size,
            total:g.postits+g.sketches+g.polaroids,
            topAuthor:Object.entries(g.authorCount).sort((a,b)=>b[1]-a[1])[0]?.[0]||'',
          }));
        setDays({past,todayData});
        setLoading(false);
      });
  },[session.roomId]);

  // Cargar riegos + suscripción en tiempo real
  useEffect(()=>{
    const load=()=>{
      sb.from('murmur_waterings')
        .select('plant_date,author_id,watered_on')
        .eq('room_id',session.roomId)
        .then(({data})=>{
          if(!data)return;
          const w={};
          data.forEach(r=>{
            if(!w[r.plant_date])w[r.plant_date]=[];
            w[r.plant_date].push({author_id:r.author_id,watered_on:r.watered_on});
          });
          setWaterings(w);
        });
    };
    load();
    const ch=sb.channel('waterings-'+session.roomId)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'murmur_waterings',filter:`room_id=eq.${session.roomId}`},load)
      .subscribe();
    return ()=>sb.removeChannel(ch);
  },[session.roomId]);

  // Cargar colores de macetas + real-time
  useEffect(()=>{
    const load=()=>{
      sb.from('murmur_pot_settings')
        .select('plant_date,pot_color')
        .eq('room_id',session.roomId)
        .then(({data})=>{
          if(!data)return;
          const s={};
          data.forEach(r=>{s[r.plant_date]=r.pot_color;});
          setPotSettings(s);
        });
    };
    load();
    const ch=sb.channel('potsettings-'+session.roomId)
      .on('postgres_changes',{event:'*',schema:'public',table:'murmur_pot_settings',filter:`room_id=eq.${session.roomId}`},load)
      .subscribe();
    return ()=>sb.removeChannel(ch);
  },[session.roomId]);

  const savePotColor=async(plantDate,colorId)=>{
    setPotSettings(p=>({...p,[plantDate]:colorId}));
    setActivePicker(null);
    await sb.from('murmur_pot_settings').upsert(
      {room_id:session.roomId,plant_date:plantDate,pot_color:colorId},
      {onConflict:'room_id,plant_date'}
    );
  };

  const getPotColors=plantDate=>{
    const id=potSettings[plantDate];
    return POT_PALETTE.find(p=>p.id===id)||POT_PALETTE[0];
  };

  // Días en que ambos regaron una planta → determina el crecimiento
  const getWateredDays=plantDate=>{
    const recs=waterings[plantDate]||[];
    const byDay={};
    recs.forEach(r=>{
      if(!byDay[r.watered_on])byDay[r.watered_on]=new Set();
      byDay[r.watered_on].add(r.author_id);
    });
    return Object.values(byDay).filter(s=>s.size>=2).length;
  };

  // ¿El usuario actual ya regó hoy esta planta?
  const iWateredToday=plantDate=>{
    const recs=waterings[plantDate]||[];
    return recs.some(r=>r.author_id===session.userId&&r.watered_on===today);
  };

  // ¿El otro usuario ya regó hoy?
  const otherWateredToday=plantDate=>{
    const recs=waterings[plantDate]||[];
    return recs.some(r=>r.author_id!==session.userId&&r.watered_on===today);
  };

  // Regar
  const waterPlant=async(e,plantDate)=>{
    e.stopPropagation();
    if(watering||iWateredToday(plantDate))return;
    setWatering(plantDate);
    // Optimistic update
    setWaterings(prev=>{
      const next={...prev};
      next[plantDate]=[...(next[plantDate]||[]),{author_id:session.userId,watered_on:today}];
      return next;
    });
    await sb.from('murmur_waterings').insert({
      room_id:session.roomId,
      plant_date:plantDate,
      author_id:session.userId,
      watered_on:today,
    });
    setWatering(null);
  };

  const fmtShort=d=>{
    const dt=new Date(d+'T12:00:00');
    return dt.toLocaleDateString('es',{day:'numeric',month:'short'});
  };
  const changePage=dir=>{
    setFade(false);
    setTimeout(()=>{setPage(p=>Math.max(0,Math.min(totalPages-1,p+dir)));setFade(true);},220);
  };
  const goPage=i=>{setFade(false);setTimeout(()=>{setPage(i);setFade(true);},220);};

  const lightCls=dark?'':' light';

  if(loading||!days){
    return(
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:dark?'rgba(232,232,236,.4)':'rgba(20,30,50,.4)',fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontSize:'1.1rem',letterSpacing:'.04em'}}>
        cargando jardín...
      </div>
    );
  }

  const allSlots=[...days.past,days.todayData];
  const totalPages=Math.max(1,Math.ceil(allSlots.length/ITEMS));
  const pageSlots=allSlots.slice(page*ITEMS,(page+1)*ITEMS);
  const todayLabel=days.todayData.total===0?'aún sin notas':days.todayData.total<=2?'falta poco...':'casi lista ·✦';

  const navBtnStyle={
    position:'absolute',top:'50%',transform:'translateY(-50%)',
    width:38,height:38,borderRadius:11,border:'none',cursor:'pointer',
    display:'flex',alignItems:'center',justifyContent:'center',
    background:dark?'rgba(14,18,28,.65)':'rgba(255,255,255,.55)',
    backdropFilter:'blur(12px)',color:dark?'rgba(232,232,236,.7)':'rgba(20,30,50,.6)',
    boxShadow:'0 4px 12px rgba(0,0,0,.25)',transition:'all .2s',zIndex:10,
  };

  return(
    <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',overflow:'hidden'}} onClick={()=>setActivePicker(null)}>

      {/* Flechas de navegación */}
      {totalPages>1&&page>0&&(
        <button style={{...navBtnStyle,left:12}} onClick={()=>changePage(-1)}>
          <Icon.ChevronLeft className="icon"/>
        </button>
      )}
      {totalPages>1&&page<totalPages-1&&(
        <button style={{...navBtnStyle,right:12}} onClick={()=>changePage(1)}>
          <Icon.ChevronRight className="icon"/>
        </button>
      )}

      {/* Grid de macetas */}
      <div style={{opacity:fade?1:0,transition:'opacity .22s ease',display:'grid',gridTemplateColumns:'repeat(3,120px)',gap:'16px 28px',padding:'24px 48px 8px'}}>
        {pageSlots.map(slot=>{
          const plantType=slot.isToday?null:selectPlant(slot.date,slot);
          const PlantComp=plantType?PLANT_COMPONENTS[plantType]:null;
          const wateredDays=slot.isToday?0:getWateredDays(slot.date);
          const growth=slot.isToday?0:calcGrowth(wateredDays);
          const meWatered=!slot.isToday&&iWateredToday(slot.date);
          const themWatered=!slot.isToday&&otherWateredToday(slot.date);
          const canWater=!slot.isToday&&!meWatered&&watering!==slot.date;
          const isFullyGrown=wateredDays>=7;
          const isHovered=tooltip?.slot?.date===slot.date;
          const potColors=slot.isToday?POT_PALETTE[0]:getPotColors(slot.date);
          const pickerOpen=activePicker===slot.date;

          return(
            <div key={slot.date}
              style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,position:'relative',cursor:slot.isToday?'default':'pointer'}}
              onMouseEnter={e=>{if(!slot.isToday&&!pickerOpen)setTooltip({slot,rect:e.currentTarget.getBoundingClientRect()});}}
              onMouseLeave={()=>setTooltip(null)}
              onClick={e=>{
                if(pickerOpen){setActivePicker(null);return;}
                if(!slot.isToday)setTooltip(t=>t?.slot?.date===slot.date?null:{slot,rect:e.currentTarget.getBoundingClientRect()});
              }}
            >
              {/* Planta + Maceta */}
              <div style={{position:'relative',width:100,height:180}}>
                {PlantComp&&(
                  <div style={{
                    position:'absolute',bottom:58,left:'50%',
                    width:80,height:88,
                    transform:'translateX(-50%)',
                    filter:isHovered?'brightness(1.08)':'none',transition:'filter .2s',
                  }}>
                    {/* capa breathe — separada para no pisar el translateX */}
                    <div style={{width:'100%',height:'100%',animation:'breathe 6s ease-in-out infinite',transformOrigin:'bottom center'}}>
                      {/* capa crecimiento */}
                      <div style={{transform:`scale(${growth})`,transformOrigin:'bottom center',width:'100%',height:'100%',transition:'transform 1.2s var(--ease-out-expo)'}}>
                        <PlantComp/>
                      </div>
                    </div>
                  </div>
                )}
                <div style={{position:'absolute',bottom:0,left:'50%',transform:'translateX(-50%)'}}>
                  <Pot empty={!!slot.isToday} potColors={potColors}/>
                </div>

                {/* Botón paleta */}
                {!slot.isToday&&(
                  <button
                    onClick={e=>{e.stopPropagation();setTooltip(null);setActivePicker(p=>p===slot.date?null:slot.date);}}
                    title="cambiar color"
                    style={{
                      position:'absolute',bottom:2,left:-4,
                      width:22,height:22,borderRadius:7,border:'none',
                      background:pickerOpen
                        ?'rgba(255,200,100,.35)'
                        :dark?'rgba(255,255,255,.1)':'rgba(0,0,0,.08)',
                      backdropFilter:'blur(8px)',cursor:'pointer',
                      display:'flex',alignItems:'center',justifyContent:'center',
                      opacity:isHovered||pickerOpen?1:.35,
                      transition:'all .2s',boxShadow:'0 2px 6px rgba(0,0,0,.2)',
                    }}
                  >
                    <svg viewBox="0 0 16 16" width="11" height="11" fill="none">
                      <circle cx="8" cy="8" r="6.5" stroke={dark?'rgba(232,232,236,.7)':'rgba(20,30,50,.6)'} strokeWidth="1.2"/>
                      <circle cx="5" cy="6" r="1.4" fill="#e05050"/>
                      <circle cx="8" cy="4.5" r="1.4" fill="#e0b030"/>
                      <circle cx="11" cy="6" r="1.4" fill="#50b050"/>
                      <circle cx="11" cy="10" r="1.4" fill="#5070e0"/>
                      <circle cx="5" cy="10" r="1.4" fill="#c050c0"/>
                    </svg>
                  </button>
                )}

                {/* Color picker inline */}
                {pickerOpen&&(
                  <div
                    onClick={e=>e.stopPropagation()}
                    style={{
                      position:'absolute',bottom:70,left:'50%',transform:'translateX(-50%)',
                      zIndex:300,
                      background:dark?'rgba(14,18,28,.95)':'rgba(252,250,245,.95)',
                      backdropFilter:'blur(20px) saturate(180%)',
                      border:`1px solid ${dark?'rgba(255,255,255,.12)':'rgba(20,30,50,.1)'}`,
                      borderRadius:13,padding:'10px 10px 8px',
                      boxShadow:'0 8px 28px rgba(0,0,0,.35)',
                      animation:'modalIn .18s var(--ease-out-expo)',
                    }}
                  >
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,opacity:.45,letterSpacing:'.06em',marginBottom:7,textAlign:'center'}}>color de maceta</div>

                          style={{
                            width:22,height:22,borderRadius:7,border:'none',cursor:'pointer',
                            background:p.b,
                            outline:potColors.id===p.id?`2px solid ${dark?'rgba(255,255,255,.7)':'rgba(20,30,50,.6)'}`:'none',
                            outlineOffset:2,
                            boxShadow:`inset 0 -3px 0 ${p.s}`,
                            transition:'transform .15s',

                          onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}

                    </div>

                {/* Botón de regar */}
                {!slot.isToday&&!isFullyGrown&&(
                  <button
                    onClick={e=>waterPlant(e,slot.date)}
                    title={meWatered?'ya regaste hoy':'regar'}
                    style={{
                      position:'absolute',bottom:2,right:-4,
                      width:26,height:26,borderRadius:8,border:'none',
                      background:meWatered
                        ?dark?'rgba(255,255,255,.08)':'rgba(0,0,0,.06)'
                        :'rgba(100,180,255,.22)',
                      backdropFilter:'blur(8px)',
                      cursor:meWatered?'default':'pointer',
                      display:'flex',alignItems:'center',justifyContent:'center',
                      opacity:meWatered?.45:1,
                      transition:'all .2s',
                      boxShadow:'0 2px 6px rgba(0,0,0,.2)',
                    }}
                  >
                    <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke={meWatered?'currentColor':'#60b8ff'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill={meWatered?'none':'rgba(96,184,255,.3)'}/>
                      <path d="M12 6v6l4 2"/>
                      <path d="M7 14c0 2 1.5 4 5 4s5-2 5-4-5-2-5-2-5 0-5 2z" fill={meWatered?'none':'rgba(96,184,255,.4)'} stroke={meWatered?'currentColor':'#60b8ff'}/>
                    </svg>
                  </button>
                )}
                {isFullyGrown&&(
                  <div style={{position:'absolute',bottom:4,right:-2,fontSize:12}}>✨</div>
                )}
              </div>

              {/* Sombra de repisa */}
              <div style={{width:110,height:6,borderRadius:'0 0 6px 6px',background:dark?'rgba(0,0,0,.18)':'rgba(0,0,0,.08)',marginTop:-4,marginBottom:2,filter:'blur(2px)'}}/>

              {/* Indicadores de riego (dos gotitas) */}
              {!slot.isToday&&(
                <div style={{display:'flex',gap:3,alignItems:'center',marginBottom:1}}>
                  <svg viewBox="0 0 10 13" width="7" height="9">
                    <path d="M5 1 Q8 5 8 8 A3 3 0 0 1 2 8 Q2 5 5 1Z"
                      fill={meWatered?'#60b8ff':'none'}
                      stroke={meWatered?'#60b8ff':dark?'rgba(232,232,236,.2)':'rgba(20,30,50,.2)'}
                      strokeWidth="1"/>
                  </svg>
                  <svg viewBox="0 0 10 13" width="7" height="9">
                    <path d="M5 1 Q8 5 8 8 A3 3 0 0 1 2 8 Q2 5 5 1Z"
                      fill={themWatered?'#a78bfa':'none'}
                      stroke={themWatered?'#a78bfa':dark?'rgba(232,232,236,.2)':'rgba(20,30,50,.2)'}
                      strokeWidth="1"/>
                  </svg>
                  {!isFullyGrown&&(
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:8,opacity:.4,marginLeft:2,letterSpacing:'-.02em'}}>
                      {wateredDays}/7
                    </span>
                  )}
                </div>
              )}

              {/* Fecha */}
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:dark?'rgba(232,232,236,.5)':'rgba(20,30,50,.45)',letterSpacing:'.06em',textAlign:'center'}}>
                {slot.isToday?'hoy':fmtShort(slot.date)}
              </div>

              {/* Nombre de la planta / estado */}
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontSize:12.5,color:dark?'rgba(232,232,236,.7)':'rgba(20,30,50,.65)',textAlign:'center',maxWidth:110,lineHeight:1.3}}>
                {slot.isToday?todayLabel:plantType}
              </div>
            </div>
          );
        })}
        {Array.from({length:Math.max(0,ITEMS-pageSlots.length)}).map((_,i)=>(
          <div key={'empty-'+i} style={{width:120,height:240}}/>
        ))}
      </div>

      {/* Repisa */}
      <div style={{
        width:'min(480px,90vw)',height:14,borderRadius:4,marginTop:-2,
        background:dark?'linear-gradient(180deg,#a0784a,#7a5830)':'linear-gradient(180deg,#d4a870,#b8885c)',
        boxShadow:dark?'0 6px 18px rgba(0,0,0,.4)':'0 6px 18px rgba(0,0,0,.18)',
        position:'relative',
      }}>
        <div style={{position:'absolute',top:0,left:'5%',right:'5%',height:'40%',background:'rgba(255,255,255,.12)',borderRadius:'4px 4px 0 0'}}/>
      </div>

      {/* Puntos de página */}
      {totalPages>1&&(
        <div style={{display:'flex',gap:6,marginTop:20}}>
          {Array.from({length:totalPages}).map((_,i)=>(
            <div key={i} onClick={()=>goPage(i)} style={{
              width:i===page?18:6,height:6,borderRadius:3,cursor:'pointer',
              background:i===page?(dark?'rgba(232,232,236,.8)':'rgba(20,30,50,.7)'):(dark?'rgba(232,232,236,.2)':'rgba(20,30,50,.18)'),
              transition:'all .3s ease',
            }}/>
          ))}
        </div>
      )}

      {/* Tooltip hover */}
      {tooltip&&(
        <div style={{
          position:'fixed',
          left:Math.min(tooltip.rect.left+50,window.innerWidth-180),
          top:Math.max(10,tooltip.rect.top-110),
          zIndex:200,
          background:dark?'rgba(14,18,28,.92)':'rgba(252,250,245,.92)',
          backdropFilter:'blur(16px) saturate(180%)',
          border:`1px solid ${dark?'rgba(255,255,255,.12)':'rgba(20,30,50,.1)'}`,
          borderRadius:13,padding:'10px 14px',
          fontSize:12,color:dark?'rgba(232,232,236,.85)':'rgba(20,30,50,.8)',
          boxShadow:'0 8px 24px rgba(0,0,0,.28)',
          pointerEvents:'none',
          animation:'modalIn .2s var(--ease-out-expo)',
          minWidth:152,
        }}>
          <div style={{position:'absolute',top:0,left:'15%',right:'15%',height:1,background:dark?'linear-gradient(90deg,transparent,rgba(255,255,255,.16) 50%,transparent)':'linear-gradient(90deg,transparent,rgba(255,255,255,.8) 50%,transparent)'}}/>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:9.5,opacity:.55,marginBottom:5,letterSpacing:'.06em'}}>{fmtShort(tooltip.slot.date)}</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontSize:14,marginBottom:3}}>
            {tooltip.slot.total} nota{tooltip.slot.total!==1?'s':''}
          </div>
          {tooltip.slot.topAuthor&&(
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontSize:11.5,opacity:.65,marginBottom:4}}>más activ@: {tooltip.slot.topAuthor}</div>
          )}
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,opacity:.5,letterSpacing:'.04em',display:'flex',gap:6,alignItems:'center'}}>
            <span>💧 {getWateredDays(tooltip.slot.date)}/7 días</span>
            {getWateredDays(tooltip.slot.date)>=7&&<span>✨ lista</span>}
          </div>
        </div>
      )}
    </div>
  );
}

// App
// ═══════════════════════════════════════════════════════════
function App(){
  const [session,setSession]=useState(null);
  const [elements,setElements]=useState([]);
  const [ready,setReady]=useState(false);
  const [currentDay,setCurrentDay]=useState(todayStr());
  const [isDark,setIsDark]=useState(getIsDark());
  const [manual,setManual]=useState(null);
  const [showPostit,setShowPostit]=useState(false);
  const [showDraw,setShowDraw]=useState(false);
  const [showInvite,setShowInvite]=useState(false);
  const [inviteUrl,setInviteUrl]=useState('');
  const [isFullscreen,setIsFullscreen]=useState(false);
  const [isPanning,setIsPanning]=useState(false);
  const [showGarden,setShowGarden]=useState(false);
  // zoomPct es solo para mostrar en UI — el motor gestiona el estado real
  const [zoomPct,setZoomPct]=useState(100);

  const viewportRef=useRef(null);
  const worldRef=useRef(null);
  const fileRef=useRef(null);
  const filterCanvas=useRef(document.createElement('canvas'));
  // Estado del motor: tx, ty, scale viven aquí (mutable, no React)
  const G=useRef({tx:0,ty:0,scale:1});

  const dark=manual?manual==='night':isDark;

  // Cargar sesión de localStorage
  useEffect(()=>{
    const s={userId:ls.get('userId'),userName:ls.get('userName'),roomId:ls.get('roomId')};
    if(s.userId&&s.roomId)setSession(s);
    else setReady(true);
  },[]);

  useEffect(()=>{
    const i=setInterval(()=>setIsDark(getIsDark()),60000);
    return()=>clearInterval(i);
  },[]);

  useEffect(()=>{
    const onFs=()=>setIsFullscreen(!!(document.fullscreenElement||document.webkitFullscreenElement));
    document.addEventListener('fullscreenchange',onFs);
    document.addEventListener('webkitfullscreenchange',onFs);
    return()=>{document.removeEventListener('fullscreenchange',onFs);document.removeEventListener('webkitfullscreenchange',onFs);};
  },[]);

  // ── Motor de gestos ─────────────────────────────────────
  // Corre cuando session cambia (i.e., cuando la UI del tablón se monta).
  // Accede al DOM directamente — sin closures stale, sin setViewport durante el gesto.
  useEffect(()=>{
    if(!session)return;
    const vp=viewportRef.current;
    const w=worldRef.current;
    if(!vp||!w)return;

    // Restaurar viewport guardado
    const saved=ls.get('viewport_'+session.roomId);
    if(saved&&typeof saved.scale==='number'){
      G.current.tx=saved.tx||0;
      G.current.ty=saved.ty||0;
      G.current.scale=saved.scale||1;
    }

    const applyT=()=>{
      w.style.transform=`translate(${G.current.tx}px,${G.current.ty}px) scale(${G.current.scale})`;
    };
    const commit=()=>{
      ls.set('viewport_'+session.roomId,{...G.current});
      setZoomPct(Math.round(G.current.scale*100));
    };

    // Aplicar estado inicial
    applyT();
    setZoomPct(Math.round(G.current.scale*100));

    // Estado local del gesto (completamente mutable)
    let panning=false,pinching=false;
    let startCx=0,startCy=0,startTx=0,startTy=0;
    let pinchDist=0,pinchCx=0,pinchCy=0,pinchTx=0,pinchTy=0,pinchScale=1;

    // ── Wheel ──
    const onWheel=(e)=>{
      e.preventDefault();
      const delta=-e.deltaY*(e.deltaMode===1?0.05:0.0012);
      const ns=Math.max(MIN_ZOOM,Math.min(MAX_ZOOM,G.current.scale*(1+delta)));
      if(Math.abs(ns-G.current.scale)<0.001)return;
      const r=vp.getBoundingClientRect();
      const cx=e.clientX-r.left-r.width/2;
      const cy=e.clientY-r.top-r.height/2;
      const ratio=ns/G.current.scale;
      G.current.tx=cx-(cx-G.current.tx)*ratio;
      G.current.ty=cy-(cy-G.current.ty)*ratio;
      G.current.scale=ns;
      applyT();
      commit();
    };

    // ── Mouse ──
    const onMouseDown=(e)=>{
      if(e.button!==0&&e.button!==1)return;
      if(e.button===0&&e.target.closest('.board-el'))return;
      e.preventDefault();
      panning=true;
      startCx=e.clientX;startCy=e.clientY;
      startTx=G.current.tx;startTy=G.current.ty;
      setIsPanning(true);
    };
    const onMouseMove=(e)=>{
      if(!panning)return;
      G.current.tx=startTx+(e.clientX-startCx);
      G.current.ty=startTy+(e.clientY-startCy);
      applyT();
    };
    const onMouseUp=()=>{
      if(!panning)return;
      panning=false;
      setIsPanning(false);
      commit();
    };

    // ── Touch ──
    const onTouchStart=(e)=>{
      if(e.touches.length===2){
        e.preventDefault();
        pinching=true;panning=false;
        const t1=e.touches[0],t2=e.touches[1];
        pinchDist=Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY);
        pinchCx=(t1.clientX+t2.clientX)/2;
        pinchCy=(t1.clientY+t2.clientY)/2;
        pinchTx=G.current.tx;pinchTy=G.current.ty;pinchScale=G.current.scale;
        return;
      }
      // 1 dedo: panear solo si tocó el fondo (no un elemento)
      if(e.touches.length===1&&!e.target.closest('.board-el')){
        e.preventDefault();
        panning=true;
        startCx=e.touches[0].clientX;startCy=e.touches[0].clientY;
        startTx=G.current.tx;startTy=G.current.ty;
        setIsPanning(true);
      }
    };
    const onTouchMove=(e)=>{
      if(pinching&&e.touches.length===2){
        e.preventDefault();
        const t1=e.touches[0],t2=e.touches[1];
        const dist=Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY);
        const cx=(t1.clientX+t2.clientX)/2,cy=(t1.clientY+t2.clientY)/2;
        const ns=Math.max(MIN_ZOOM,Math.min(MAX_ZOOM,pinchScale*(dist/pinchDist)));
        const r=vp.getBoundingClientRect();
        const px=pinchCx-r.left-r.width/2,py=pinchCy-r.top-r.height/2;
        const ratio=ns/pinchScale;
        G.current.tx=px-(px-pinchTx)*ratio+(cx-pinchCx);
        G.current.ty=py-(py-pinchTy)*ratio+(cy-pinchCy);
        G.current.scale=ns;
        applyT();
        return;
      }
      if(panning&&e.touches.length===1){
        e.preventDefault();
        G.current.tx=startTx+(e.touches[0].clientX-startCx);
        G.current.ty=startTy+(e.touches[0].clientY-startCy);
        applyT();
      }
    };
    const onTouchEnd=(e)=>{
      if(pinching&&(!e.touches||e.touches.length<2)){
        pinching=false;
        commit();
        if(e.touches&&e.touches.length===1){
          panning=true;
          startCx=e.touches[0].clientX;startCy=e.touches[0].clientY;
          startTx=G.current.tx;startTy=G.current.ty;
          return;
        }
      }
      if(panning&&(!e.touches||e.touches.length===0)){
        panning=false;
        setIsPanning(false);
        commit();
      }
    };

    vp.addEventListener('wheel',onWheel,{passive:false});
    vp.addEventListener('mousedown',onMouseDown);
    vp.addEventListener('touchstart',onTouchStart,{passive:false});
    document.addEventListener('mousemove',onMouseMove);
    document.addEventListener('mouseup',onMouseUp);
    document.addEventListener('touchmove',onTouchMove,{passive:false});
    document.addEventListener('touchend',onTouchEnd);

    return()=>{
      vp.removeEventListener('wheel',onWheel);
      vp.removeEventListener('mousedown',onMouseDown);
      vp.removeEventListener('touchstart',onTouchStart);
      document.removeEventListener('mousemove',onMouseMove);
      document.removeEventListener('mouseup',onMouseUp);
      document.removeEventListener('touchmove',onTouchMove);
      document.removeEventListener('touchend',onTouchEnd);
    };
  },[session,showGarden]);

  // Zoom UI buttons — escriben al DOM y al G.current directamente
  const applyAndCommit=(tx,ty,scale)=>{
    const w=worldRef.current;if(!w)return;
    G.current.tx=tx;G.current.ty=ty;G.current.scale=scale;
    w.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
    ls.set('viewport_'+(session?.roomId||''),{tx,ty,scale});
    setZoomPct(Math.round(scale*100));
  };
  const zoomIn=()=>applyAndCommit(G.current.tx,G.current.ty,Math.min(MAX_ZOOM,G.current.scale*(1+ZOOM_STEP)));
  const zoomOut=()=>applyAndCommit(G.current.tx,G.current.ty,Math.max(MIN_ZOOM,G.current.scale*(1-ZOOM_STEP)));
  const centerView=()=>applyAndCommit(0,0,1);

  // Cargar elementos del día
  useEffect(()=>{
    if(!session)return;
    const load=()=>{
      sb.from('murmur_notes')
        .select('*').eq('room_id',session.roomId)
        .gte('created_at',currentDay+'T00:00:00').lte('created_at',currentDay+'T23:59:59')
        .then(({data})=>{
          if(data){
            const migrated=data.map(el=>{
              if(el.x>=0&&el.x<=1000&&el.y>=0&&el.y<=1000){
                return{...el,x:Math.round((el.x-500)*1.6),y:Math.round((el.y-400)*1.6)};
              }
              return el;
            });
            setElements(migrated);
          }
          setReady(true);
        });
    };
    load();
    const poll=setInterval(load,4000);
    const ch=sb.channel('board_'+session.roomId+'_'+currentDay)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'murmur_notes',filter:`room_id=eq.${session.roomId}`},
        p=>{if(p.new.created_at?.startsWith(currentDay))setElements(prev=>prev.find(e=>e.id===p.new.id)?prev:[...prev,p.new]);})
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'murmur_notes',filter:`room_id=eq.${session.roomId}`},
        p=>{if(p.new.created_at?.startsWith(currentDay))setElements(prev=>prev.map(e=>e.id===p.new.id?p.new:e));})
      .on('postgres_changes',{event:'DELETE',schema:'public',table:'murmur_notes',filter:`room_id=eq.${session.roomId}`},
        p=>{setElements(prev=>prev.filter(e=>e.id!==p.old.id));})
      .subscribe();
    return()=>{clearInterval(poll);sb.removeChannel(ch);};
  },[session,currentDay]);

  // Element actions
  const addElement=async(data)=>{
    if(!session)return;
    const wx=Math.round(-G.current.tx/G.current.scale);
    const wy=Math.round(-G.current.ty/G.current.scale);
    const jitter=80;
    const el={
      room_id:session.roomId,author_id:session.userId,author_name:session.userName,
      x:wx+Math.round((Math.random()-.5)*jitter),
      y:wy+Math.round((Math.random()-.5)*jitter),
      rot:randRot(),z:Date.now(),...data,
      created_at:new Date().toISOString(),
    };
    await sb.from('murmur_notes').insert(el);
  };

  const moveElement=useCallback(async(id,x,y,w,h)=>{
    const upd={x,y};if(w!==undefined)upd.w=w;if(h!==undefined)upd.h=h;
    setElements(prev=>prev.map(e=>e.id===id?{...e,...upd}:e));
    await sb.from('murmur_notes').update(upd).eq('id',id);
  },[]);

  const pressElement=useCallback(async(id)=>{
    const z=Date.now();
    setElements(prev=>prev.map(e=>e.id===id?{...e,z}:e));
    sb.from('murmur_notes').update({z}).eq('id',id);
  },[]);

  const deleteElement=async(id)=>{
    await sb.from('murmur_notes').delete().eq('id',id);
    setElements(prev=>prev.filter(e=>e.id!==id));
  };

  const updateCaption=async(id,caption)=>{
    await sb.from('murmur_notes').update({caption}).eq('id',id);
  };

  const handlePhoto=async e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=async ev=>{
      const filtered=await applyY2K(filterCanvas.current,ev.target.result);
      await addElement({type:'polaroid',content:filtered,w:190,caption:''});
    };
    r.readAsDataURL(file);e.target.value='';
  };

  const changeDay=delta=>{
    const d=new Date(currentDay+'T12:00:00');d.setDate(d.getDate()+delta);
    setCurrentDay(d.toISOString().split('T')[0]);
  };

  const getInvite=async()=>{
    const url=`${window.location.origin}${window.location.pathname}?room=${session.roomId}`;
    setInviteUrl(url);setShowInvite(true);
    try{await navigator.clipboard.writeText(url);}catch{}
  };

  const toggleFullscreen=async()=>{
    try{
      if(!document.fullscreenElement&&!document.webkitFullscreenElement){
        const el=document.documentElement;
        if(el.requestFullscreen)await el.requestFullscreen();
        else if(el.webkitRequestFullscreen)await el.webkitRequestFullscreen();
      }else{
        if(document.exitFullscreen)await document.exitFullscreen();
        else if(document.webkitExitFullscreen)await document.webkitExitFullscreen();
      }
    }catch(e){}
  };

  // ── Render ──────────────────────────────────────────────
  if(!ready&&!session)return null;
  if(!session)return <Onboarding onDone={s=>setSession(s)}/>;

  const isToday=currentDay===todayStr();
  const lightCls=dark?'':' light';

  return(
    <div className="board" data-light={!dark} style={{background:dark?'#03050a':'#cae5f0'}}>
      <OutdoorBg isDark={dark}/>

      {/* Modals */}
      {showInvite&&(
        <div className="overlay">
          <div className={`modal${dark?'':' light'}`}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <h3>Compartí el tablón</h3>
              <button className="modal-close" onClick={()=>setShowInvite(false)}><Icon.X/></button>
            </div>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontSize:14,color:dark?'rgba(232,232,236,.55)':'rgba(20,30,50,.55)',letterSpacing:'.01em'}}>
              Enviá este link. Solo hace falta abrirlo y elegir un apodo.
            </p>
            <div className="iurl">{inviteUrl}</div>
            <p style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:dark?'rgba(232,232,236,.4)':'rgba(20,30,50,.4)',textAlign:'center',letterSpacing:'.05em'}}>copiado al portapapeles ✓</p>
            <button className={`mbtn primary${dark?'':' light'}`} onClick={()=>setShowInvite(false)}>listo</button>
          </div>
        </div>
      )}
      {showPostit&&<PostitModal isDark={dark} onCancel={()=>setShowPostit(false)}
        onSave={async d=>{await addElement({type:'postit',content:d.text,font:d.font,color:d.color});setShowPostit(false);}}/>}
      {showDraw&&<DrawModal isDark={dark} onCancel={()=>setShowDraw(false)}
        onSave={async dataUrl=>{await addElement({type:'sketch',content:dataUrl,w:240,h:180});setShowDraw(false);}}/>}

      {/* Header */}
      <div className="header">
        <div className="header-mark"><Icon.Logo className="header-mark-svg"/></div>
        <div className="header-actions">
          <button className={`hbtn${lightCls}`} onClick={toggleFullscreen}>
            {isFullscreen?<Icon.Minimize/>:<Icon.Maximize/>}
          </button>
          <div className={`hbtn-group${lightCls}`}>
            <button className={`hbtn${manual==='day'?' active':''}${lightCls}`} onClick={()=>setManual(manual==='day'?null:'day')}><Icon.Sun/></button>
            <button className={`hbtn${manual==='night'?' active':''}${lightCls}`} onClick={()=>setManual(manual==='night'?null:'night')}><Icon.Moon/></button>
          </div>
          <button className={`hbtn${showGarden?' active':''}${lightCls}`} onClick={()=>setShowGarden(g=>!g)} title="Jardín">
            <Icon.Leaf/>
          </button>
          <button className={`hbtn${lightCls}`} onClick={getInvite}><Icon.Plus className="icon-sm"/>invitar</button>
        </div>
      </div>

      {showGarden ? (
        <Garden session={session} dark={dark}/>
      ) : (<>
        {/* Daynav */}
        <div className={`daynav${lightCls}`}>
          <button onClick={()=>changeDay(-1)}><Icon.ChevronLeft className="icon-sm"/></button>
          <span className="day-label">{currentDay===todayStr()?'hoy':fmtDate(currentDay)}</span>
          <button onClick={()=>changeDay(1)} disabled={isToday}><Icon.ChevronRight className="icon-sm"/></button>
        </div>

        {/* Canvas */}
        <div
          ref={viewportRef}
          className={`canvas-viewport${isPanning?' panning':''}`}
        >
          <div ref={worldRef} className="canvas-world">
            {elements.map(el=>(
              <BoardEl key={el.id} el={el}
                onMove={moveElement} onDelete={deleteElement}
                onUpdateCaption={updateCaption} onPress={pressElement}
                scale={G.current.scale}/>
            ))}
          </div>

          {elements.length===0&&ready&&(
            <div className="empty-state">
              <div className="empty-mark">
                <Icon.Logo className="empty-glyph" style={{color:dark?'#e8e4f0':'#1a2840'}}/>
                <p className={`empty-text${lightCls}`}>
                  {isToday?'el tablón te espera...':'sin recuerdos este día'}
                </p>
              </div>
            </div>
          )}
        </div>

        {/* Center button */}
        <button className={`center-btn${lightCls}`} onClick={centerView} title="Centrar">
          <svg className="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v4M12 18v4M2 12h4M18 12h4" strokeLinecap="round"/>
          </svg>
        </button>

        {/* Zoom */}
        <div className={`zoom-indicator${lightCls}`}>
          <button onClick={zoomOut}><Icon.X className="icon-sm" style={{transform:'rotate(45deg)'}}/></button>
          <span className="zoom-value">{zoomPct}%</span>
          <button onClick={zoomIn}><Icon.Plus className="icon-sm"/></button>
        </div>

        {/* Toolbar */}
        <div className={`toolbar${lightCls}`}>
          <span className="tbtn-label">añadir</span>
          <button className="tbtn" onClick={()=>setShowPostit(true)}><Icon.Note/></button>
          <button className="tbtn" onClick={()=>setShowDraw(true)}><Icon.Pencil/></button>
          <button className="tbtn" onClick={()=>fileRef.current?.click()}><Icon.Camera/></button>
          <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handlePhoto}/>
        </div>
      </>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
