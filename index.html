<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="description" content="Mi Journal personal con tracker de bienestar" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📓%3C/text%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📓%3C/text%3E%3C/svg%3E" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Mi Journal" />
<title>Mi Journal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { margin: 0; font-family: 'Inter', system-ui, sans-serif; }
  textarea { font-family: inherit; }
  input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; cursor: pointer; }
  input[type=range]::-moz-range-thumb { width: 16px; height: 16px; border: none; border-radius: 50%; cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

// ============ ICONS (inline SVG) ============
const Icon = ({ d, size = 16, stroke = 2 }) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">{d}</svg>
);
const ChevronLeft = (p) => <Icon {...p} d={<polyline points="15 18 9 12 15 6"/>} />;
const ChevronRight = (p) => <Icon {...p} d={<polyline points="9 18 15 12 9 6"/>} />;
const Sun = (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></>} />;
const Moon = (p) => <Icon {...p} d={<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>} />;
const Mountain = (p) => <Icon {...p} d={<path d="m8 3 4 8 5-5 5 15H2L8 3z"/>} />;
const Coffee = (p) => <Icon {...p} d={<><path d="M17 8h1a4 4 0 1 1 0 8h-1M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8zM6 1v3M10 1v3M14 1v3"/></>} />;
const Cpu = (p) => <Icon {...p} d={<><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 14h3M1 9h3M1 14h3"/></>} />;
const Plus = (p) => <Icon {...p} d={<><path d="M12 5v14M5 12h14"/></>} />;
const Trash = (p) => <Icon {...p} d={<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>} />;
const Check = (p) => <Icon {...p} d={<polyline points="20 6 9 17 4 12"/>} stroke={3} />;
const Book = (p) => <Icon {...p} d={<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>} />;
const Bars = (p) => <Icon {...p} d={<><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></>} />;

// ============ STORAGE (localStorage) ============
const storage = {
  get: (key) => {
    try { const v = localStorage.getItem('journal_' + key); return v ? JSON.parse(v) : null; } catch { return null; }
  },
  set: (key, value) => {
    try { localStorage.setItem('journal_' + key, JSON.stringify(value)); } catch {}
  }
};

function Journal() {
  const [currentDate, setCurrentDate] = useState(() => new Date().toISOString().split('T')[0]);
  const [entries, setEntries] = useState({});
  const [theme, setTheme] = useState('day-night');
  const [manualMode, setManualMode] = useState(null);
  const [autoIsDark, setAutoIsDark] = useState(false);
  const [view, setView] = useState('journal');
  const [customTrackers, setCustomTrackers] = useState([]);
  const [newTrackerName, setNewTrackerName] = useState('');
  const [showAddTracker, setShowAddTracker] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const saveTimeout = useRef(null);

  const defaultTrackers = [
    { id: 'food', label: 'Comí bien', emoji: '🍎' },
    { id: 'social', label: 'Vi a amigos/familia', emoji: '👥' },
    { id: 'hobby', label: 'Trabajé en un hobby', emoji: '🎨' },
    { id: 'project', label: 'Avancé en proyecto personal', emoji: '💼' },
    { id: 'exercise', label: 'Hice ejercicio', emoji: '🏃' },
    { id: 'sleep', label: 'Dormí bien', emoji: '😴' },
    { id: 'selfcare', label: 'Tiempo para mí', emoji: '🧘' },
  ];

  useEffect(() => {
    const e = storage.get('entries'); if (e) setEntries(e);
    const t = storage.get('theme'); if (t) setTheme(t);
    const c = storage.get('customTrackers'); if (c) setCustomTrackers(c);
    setLoaded(true);
  }, []);

  useEffect(() => {
    const updateAuto = () => {
      const h = new Date().getHours();
      setAutoIsDark(h < 7 || h >= 18);
    };
    updateAuto();
    const i = setInterval(updateAuto, 60000);
    return () => clearInterval(i);
  }, []);

  const isDark = manualMode ? manualMode === 'night' : autoIsDark;

  const saveEntries = useCallback((data) => {
    if (saveTimeout.current) clearTimeout(saveTimeout.current);
    saveTimeout.current = setTimeout(() => storage.set('entries', data), 400);
  }, []);

  const getEntry = (date) => entries[date] || { text: '', mood: 3, trackers: {}, customTrackers: {} };

  const updateEntry = (updates) => {
    const newEntries = { ...entries, [currentDate]: { ...getEntry(currentDate), ...updates } };
    setEntries(newEntries);
    saveEntries(newEntries);
  };

  const toggleTracker = (id, isCustom = false) => {
    const entry = getEntry(currentDate);
    const key = isCustom ? 'customTrackers' : 'trackers';
    const current = entry[key] || {};
    updateEntry({ [key]: { ...current, [id]: !current[id] } });
  };

  const addCustomTracker = () => {
    if (!newTrackerName.trim()) return;
    const updated = [...customTrackers, { id: 'custom_' + Date.now(), label: newTrackerName.trim() }];
    setCustomTrackers(updated);
    storage.set('customTrackers', updated);
    setNewTrackerName('');
    setShowAddTracker(false);
  };

  const removeCustomTracker = (id) => {
    const updated = customTrackers.filter(t => t.id !== id);
    setCustomTrackers(updated);
    storage.set('customTrackers', updated);
  };

  const changeDate = (delta) => {
    const d = new Date(currentDate + 'T00:00:00');
    d.setDate(d.getDate() + delta);
    setCurrentDate(d.toISOString().split('T')[0]);
  };

  const formatDate = (dateStr) => {
    const d = new Date(dateStr + 'T00:00:00');
    const days = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
    const months = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
    return `${days[d.getDay()]}, ${d.getDate()} de ${months[d.getMonth()]} de ${d.getFullYear()}`;
  };

  const isToday = currentDate === new Date().toISOString().split('T')[0];
  const entry = getEntry(currentDate);
  const moodEmojis = ['😢', '😕', '😐', '🙂', '😄'];

  const themes = {
    'day-night': {
      bg: isDark ? '#0a0a0a' : '#fafaf7',
      panel: isDark ? '#141414' : '#ffffff',
      panelBorder: isDark ? '#262626' : '#e8e6e0',
      text: isDark ? '#e8e8e8' : '#1a1a1a',
      textMuted: isDark ? '#888' : '#666',
      accent: isDark ? '#d4d4d4' : '#1a1a1a',
      inputBg: isDark ? '#0f0f0f' : '#fcfcf9',
      hover: isDark ? '#1f1f1f' : '#f0efeb',
      checked: isDark ? '#e8e8e8' : '#1a1a1a',
      checkedFg: isDark ? '#0a0a0a' : '#fafaf7',
    },
    'outdoor': {
      bg: isDark ? '#0d1521' : '#e8f2f7',
      panel: isDark ? 'rgba(15, 25, 40, 0.85)' : 'rgba(255, 255, 255, 0.85)',
      panelBorder: isDark ? 'rgba(120, 150, 180, 0.2)' : 'rgba(100, 130, 100, 0.2)',
      text: isDark ? '#e0e8f0' : '#1f3a2e',
      textMuted: isDark ? '#8a9bb0' : '#5a7065',
      accent: isDark ? '#a0c4e8' : '#2d5a3d',
      inputBg: isDark ? 'rgba(10, 18, 30, 0.6)' : 'rgba(255, 255, 255, 0.6)',
      hover: isDark ? 'rgba(40, 55, 75, 0.4)' : 'rgba(200, 220, 200, 0.4)',
      checked: isDark ? '#a0c4e8' : '#2d5a3d',
      checkedFg: isDark ? '#0d1521' : '#ffffff',
    },
    'coffee': {
      bg: isDark ? '#1f140d' : '#f5ede0',
      panel: isDark ? '#2a1d13' : '#fffaf0',
      panelBorder: isDark ? '#3d2a1c' : '#d4bfa3',
      text: isDark ? '#e8d9c2' : '#3d2817',
      textMuted: isDark ? '#a89178' : '#8a6f4f',
      accent: isDark ? '#d4a574' : '#6b3e1f',
      inputBg: isDark ? '#1a110a' : '#fdf6e8',
      hover: isDark ? '#3a2818' : '#ebe0cc',
      checked: isDark ? '#d4a574' : '#6b3e1f',
      checkedFg: isDark ? '#1f140d' : '#fffaf0',
    },
    'tech': {
      bg: isDark ? '#0a0e14' : '#f0f2f5',
      panel: isDark ? '#0f1419' : '#ffffff',
      panelBorder: isDark ? '#1f2937' : '#dde1e6',
      text: isDark ? '#cdd6e0' : '#1a2332',
      textMuted: isDark ? '#6b7a8f' : '#5a6878',
      accent: isDark ? '#4ade80' : '#0066cc',
      inputBg: isDark ? '#070a0e' : '#f8f9fb',
      hover: isDark ? '#161e2b' : '#e8ebf0',
      checked: isDark ? '#4ade80' : '#0066cc',
      checkedFg: isDark ? '#0a0e14' : '#ffffff',
    },
  };

  const t = themes[theme];

  const renderBackground = () => {
    if (theme === 'outdoor') {
      return (
        <svg className="absolute inset-0 w-full h-full pointer-events-none" preserveAspectRatio="xMidYMid slice" viewBox="0 0 1200 800">
          <defs>
            <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
              {isDark ? <><stop offset="0%" stopColor="#0a0f1a"/><stop offset="100%" stopColor="#1a2a3f"/></> : <><stop offset="0%" stopColor="#a8d4e8"/><stop offset="100%" stopColor="#e8f2f7"/></>}
            </linearGradient>
            <linearGradient id="m1" x1="0" y1="0" x2="0" y2="1">
              {isDark ? <><stop offset="0%" stopColor="#1a2535"/><stop offset="100%" stopColor="#0d1521"/></> : <><stop offset="0%" stopColor="#3d6b4a"/><stop offset="100%" stopColor="#2a4f35"/></>}
            </linearGradient>
            <linearGradient id="m2" x1="0" y1="0" x2="0" y2="1">
              {isDark ? <><stop offset="0%" stopColor="#0f1825"/><stop offset="100%" stopColor="#070d15"/></> : <><stop offset="0%" stopColor="#5a8a6a"/><stop offset="100%" stopColor="#3d6b4a"/></>}
            </linearGradient>
          </defs>
          <rect width="1200" height="800" fill="url(#sky)"/>
          {isDark && <g opacity="0.8">{Array.from({length:50}).map((_,i)=>(<circle key={i} cx={(i*137)%1200} cy={(i*73)%400} r={Math.random()*1.2+0.3} fill="white" opacity={Math.random()*0.7+0.3}/>))}</g>}
          <polygon points="0,800 0,500 200,350 400,450 600,300 800,400 1000,320 1200,420 1200,800" fill="url(#m2)"/>
          <polygon points="0,800 0,600 150,480 350,550 550,420 750,520 950,440 1200,540 1200,800" fill="url(#m1)"/>
          <polygon points="600,300 580,340 620,340" fill={isDark?"#5a6a80":"#ffffff"} opacity="0.9"/>
          <polygon points="200,350 185,380 215,380" fill={isDark?"#5a6a80":"#ffffff"} opacity="0.9"/>
          <polygon points="1000,320 985,355 1015,355" fill={isDark?"#5a6a80":"#ffffff"} opacity="0.9"/>
          {Array.from({length:25}).map((_,i)=>{const x=(i*53)%1200;const y=580+(i%5)*30;return <polygon key={i} points={`${x},${y} ${x-8},${y+25} ${x+8},${y+25}`} fill={isDark?"#0a1218":"#1f4a2a"}/>;})}
          {isDark && <g>{Array.from({length:30}).map((_,i)=>(<circle key={i} cx={(i*89)%1200} cy={(i*47)%800} r="1.5" fill="white" opacity="0.7"><animate attributeName="cy" from="-10" to="810" dur={`${8+(i%5)}s`} repeatCount="indefinite" begin={`${i*0.3}s`}/></circle>))}</g>}
        </svg>
      );
    }
    if (theme === 'coffee') {
      return (
        <div className="absolute inset-0 pointer-events-none overflow-hidden">
          <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="xMidYMid slice" viewBox="0 0 1200 800">
            <defs>
              <pattern id="paper" patternUnits="userSpaceOnUse" width="100" height="100">
                <rect width="100" height="100" fill={isDark?"#1f140d":"#f5ede0"}/>
                {Array.from({length:30}).map((_,i)=>(<circle key={i} cx={Math.random()*100} cy={Math.random()*100} r={Math.random()*0.5+0.2} fill={isDark?"#3d2818":"#d4bfa3"} opacity="0.4"/>))}
              </pattern>
              <radialGradient id="stain" cx="0.5" cy="0.5" r="0.5">
                <stop offset="0%" stopColor={isDark?"#3d2818":"#c9a87c"} stopOpacity="0.3"/>
                <stop offset="100%" stopColor={isDark?"#3d2818":"#c9a87c"} stopOpacity="0"/>
              </radialGradient>
            </defs>
            <rect width="1200" height="800" fill="url(#paper)"/>
            <ellipse cx="150" cy="150" rx="80" ry="75" fill="url(#stain)"/>
            <ellipse cx="1050" cy="650" rx="100" ry="90" fill="url(#stain)"/>
            <ellipse cx="900" cy="200" rx="60" ry="55" fill="url(#stain)"/>
          </svg>
          <svg className="absolute bottom-10 right-10 w-40 h-60 opacity-40" viewBox="0 0 100 200">
            <path d="M 30 180 Q 25 140 35 100 Q 45 60 30 20" fill="none" stroke={isDark?"#a89178":"#8a6f4f"} strokeWidth="2" opacity="0.5">
              <animate attributeName="d" values="M 30 180 Q 25 140 35 100 Q 45 60 30 20; M 30 180 Q 35 140 25 100 Q 15 60 30 20; M 30 180 Q 25 140 35 100 Q 45 60 30 20" dur="4s" repeatCount="indefinite"/>
            </path>
            <path d="M 60 180 Q 65 140 55 100 Q 45 60 60 20" fill="none" stroke={isDark?"#a89178":"#8a6f4f"} strokeWidth="2" opacity="0.4">
              <animate attributeName="d" values="M 60 180 Q 65 140 55 100 Q 45 60 60 20; M 60 180 Q 55 140 65 100 Q 75 60 60 20; M 60 180 Q 65 140 55 100 Q 45 60 60 20" dur="5s" repeatCount="indefinite"/>
            </path>
          </svg>
        </div>
      );
    }
    if (theme === 'tech') {
      return (
        <div className="absolute inset-0 pointer-events-none overflow-hidden opacity-30">
          <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="xMidYMid slice" viewBox="0 0 1200 800">
            <defs>
              <pattern id="grid" patternUnits="userSpaceOnUse" width="40" height="40">
                <path d="M 40 0 L 0 0 0 40" fill="none" stroke={isDark?"#1f2937":"#dde1e6"} strokeWidth="1"/>
              </pattern>
            </defs>
            <rect width="1200" height="800" fill="url(#grid)"/>
            <line x1="0" y1="200" x2="1200" y2="200" stroke={t.accent} strokeWidth="0.5" opacity="0.3"/>
            <line x1="0" y1="600" x2="1200" y2="600" stroke={t.accent} strokeWidth="0.5" opacity="0.3"/>
            <line x1="300" y1="0" x2="300" y2="800" stroke={t.accent} strokeWidth="0.5" opacity="0.3"/>
            <line x1="900" y1="0" x2="900" y2="800" stroke={t.accent} strokeWidth="0.5" opacity="0.3"/>
          </svg>
        </div>
      );
    }
    return null;
  };

  const getRecentDates = () => {
    const dates = [];
    const today = new Date();
    for (let i = 0; i < 14; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      dates.push(d.toISOString().split('T')[0]);
    }
    return dates;
  };

  if (!loaded) return <div style={{background:t.bg,color:t.text}} className="w-full min-h-screen flex items-center justify-center"><div className="text-sm opacity-60">Cargando...</div></div>;

  const fontFamily = theme === 'tech' ? '"SF Mono", Monaco, monospace' : theme === 'coffee' ? 'Georgia, serif' : 'Inter, system-ui, sans-serif';
  const journalFont = theme === 'coffee' ? 'Georgia, serif' : theme === 'tech' ? '"SF Mono", monospace' : 'Lora, Georgia, serif';

  const ThemeIcon = theme === 'day-night' ? (isDark ? Moon : Sun) : theme === 'outdoor' ? Mountain : theme === 'coffee' ? Coffee : Cpu;

  return (
    <div style={{background:t.bg,color:t.text,fontFamily,transition:'background 0.6s ease, color 0.6s ease'}} className="w-full min-h-screen relative">
      {renderBackground()}
      <div className="relative z-10 max-w-7xl mx-auto p-4 md:p-6 lg:p-8">
        <header className="flex flex-wrap items-center justify-between gap-4 mb-6">
          <div className="flex items-center gap-3">
            <div style={{color:t.accent}}><Book size={22}/></div>
            <h1 className="text-xl font-medium" style={{color:t.text}}>Mi Journal</h1>
          </div>
          <div className="flex items-center gap-2 flex-wrap">
            <div className="flex rounded-lg overflow-hidden text-sm" style={{background:t.panel,border:`1px solid ${t.panelBorder}`}}>
              <button onClick={()=>setView('journal')} className="px-3 py-1.5 flex items-center gap-1.5" style={{background:view==='journal'?t.accent:'transparent',color:view==='journal'?t.checkedFg:t.text}}><Book size={14}/> Hoy</button>
              <button onClick={()=>setView('history')} className="px-3 py-1.5 flex items-center gap-1.5" style={{background:view==='history'?t.accent:'transparent',color:view==='history'?t.checkedFg:t.text}}><Bars size={14}/> Historial</button>
            </div>
            <div className="flex rounded-lg overflow-hidden" style={{background:t.panel,border:`1px solid ${t.panelBorder}`}}>
              {[{id:'day-night',Ic:isDark?Moon:Sun},{id:'outdoor',Ic:Mountain},{id:'coffee',Ic:Coffee},{id:'tech',Ic:Cpu}].map(({id,Ic})=>(
                <button key={id} onClick={()=>{setTheme(id);storage.set('theme',id);}} className="p-2" style={{background:theme===id?t.accent:'transparent',color:theme===id?t.checkedFg:t.textMuted}}><Ic size={15}/></button>
              ))}
            </div>
            <div className="flex rounded-lg overflow-hidden" style={{background:t.panel,border:`1px solid ${t.panelBorder}`}}>
              <button onClick={()=>setManualMode(manualMode==='day'?null:'day')} className="p-2" style={{background:manualMode==='day'?t.accent:'transparent',color:manualMode==='day'?t.checkedFg:t.textMuted}}><Sun size={15}/></button>
              <button onClick={()=>setManualMode(manualMode==='night'?null:'night')} className="p-2" style={{background:manualMode==='night'?t.accent:'transparent',color:manualMode==='night'?t.checkedFg:t.textMuted}}><Moon size={15}/></button>
            </div>
          </div>
        </header>

        {view === 'journal' ? (
          <div className="grid grid-cols-1 lg:grid-cols-[1fr_320px] gap-6">
            <div className="rounded-2xl p-6 md:p-8" style={{background:t.panel,border:`1px solid ${t.panelBorder}`,backdropFilter:theme==='outdoor'?'blur(8px)':'none'}}>
              <div className="flex items-center justify-between mb-6">
                <button onClick={()=>changeDate(-1)} className="p-2 rounded-lg" style={{color:t.textMuted}} onMouseEnter={(e)=>e.currentTarget.style.background=t.hover} onMouseLeave={(e)=>e.currentTarget.style.background='transparent'}><ChevronLeft size={18}/></button>
                <div className="text-center">
                  <div className="text-xs uppercase tracking-wider" style={{color:t.textMuted}}>{isToday?'Hoy':'Entrada del'}</div>
                  <div className="text-base md:text-lg font-medium mt-0.5" style={{color:t.text}}>{formatDate(currentDate)}</div>
                </div>
                <button onClick={()=>changeDate(1)} disabled={isToday} className="p-2 rounded-lg disabled:opacity-30" style={{color:t.textMuted}} onMouseEnter={(e)=>!isToday&&(e.currentTarget.style.background=t.hover)} onMouseLeave={(e)=>e.currentTarget.style.background='transparent'}><ChevronRight size={18}/></button>
              </div>
              <textarea value={entry.text} onChange={(e)=>updateEntry({text:e.target.value})} placeholder="¿Cómo estuvo tu día? Escribí lo que sentiste, lo que pasó, lo que te llamó la atención..." className="w-full bg-transparent border-0 outline-none resize-none text-base md:text-lg leading-relaxed" style={{color:t.text,fontFamily:journalFont,minHeight:'420px'}}/>
            </div>

            <div className="space-y-4">
              <div className="rounded-2xl p-5" style={{background:t.panel,border:`1px solid ${t.panelBorder}`,backdropFilter:theme==='outdoor'?'blur(8px)':'none'}}>
                <div className="text-xs uppercase tracking-wider mb-3" style={{color:t.textMuted}}>Estado emocional</div>
                <div className="flex justify-between items-center mb-3">
                  {moodEmojis.map((em,i)=>(<button key={i} onClick={()=>updateEntry({mood:i+1})} className="text-2xl transition-all" style={{opacity:entry.mood===i+1?1:0.3,transform:entry.mood===i+1?'scale(1.25)':'scale(1)'}}>{em}</button>))}
                </div>
                <input type="range" min="1" max="5" value={entry.mood} onChange={(e)=>updateEntry({mood:parseInt(e.target.value)})} className="w-full" style={{accentColor:t.accent}}/>
              </div>

              <div className="rounded-2xl p-5" style={{background:t.panel,border:`1px solid ${t.panelBorder}`,backdropFilter:theme==='outdoor'?'blur(8px)':'none'}}>
                <div className="text-xs uppercase tracking-wider mb-3" style={{color:t.textMuted}}>Hoy logré</div>
                <div className="space-y-1.5">
                  {defaultTrackers.map(tr=>{
                    const checked = entry.trackers?.[tr.id];
                    return (
                      <button key={tr.id} onClick={()=>toggleTracker(tr.id)} className="w-full flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-left text-sm" style={{color:t.text}} onMouseEnter={(e)=>e.currentTarget.style.background=t.hover} onMouseLeave={(e)=>e.currentTarget.style.background='transparent'}>
                        <div className="w-5 h-5 rounded-md flex items-center justify-center flex-shrink-0" style={{background:checked?t.checked:'transparent',border:`1.5px solid ${checked?t.checked:t.panelBorder}`}}>
                          {checked && <span style={{color:t.checkedFg}}><Check size={13}/></span>}
                        </div>
                        <span className="text-base">{tr.emoji}</span>
                        <span className="flex-1" style={{opacity:checked?1:0.85}}>{tr.label}</span>
                      </button>
                    );
                  })}
                </div>
              </div>

              <div className="rounded-2xl p-5" style={{background:t.panel,border:`1px solid ${t.panelBorder}`,backdropFilter:theme==='outdoor'?'blur(8px)':'none'}}>
                <div className="flex items-center justify-between mb-3">
                  <div className="text-xs uppercase tracking-wider" style={{color:t.textMuted}}>Mis hábitos</div>
                  <button onClick={()=>setShowAddTracker(!showAddTracker)} className="p-1 rounded-md" style={{color:t.accent}} onMouseEnter={(e)=>e.currentTarget.style.background=t.hover} onMouseLeave={(e)=>e.currentTarget.style.background='transparent'}><Plus size={16}/></button>
                </div>
                {showAddTracker && (
                  <div className="mb-3 flex gap-2">
                    <input type="text" value={newTrackerName} onChange={(e)=>setNewTrackerName(e.target.value)} onKeyDown={(e)=>e.key==='Enter'&&addCustomTracker()} placeholder="Nuevo hábito..." autoFocus className="flex-1 px-3 py-1.5 text-sm rounded-lg outline-none" style={{background:t.inputBg,color:t.text,border:`1px solid ${t.panelBorder}`}}/>
                    <button onClick={addCustomTracker} className="px-3 py-1.5 text-sm rounded-lg" style={{background:t.accent,color:t.checkedFg}}>Add</button>
                  </div>
                )}
                {customTrackers.length === 0 && !showAddTracker ? (
                  <div className="text-xs py-2" style={{color:t.textMuted}}>Agregá hábitos personalizados con el botón +</div>
                ) : (
                  <div className="space-y-1.5">
                    {customTrackers.map(tr=>{
                      const checked = entry.customTrackers?.[tr.id];
                      return (
                        <div key={tr.id} className="group w-full flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm" style={{color:t.text}} onMouseEnter={(e)=>e.currentTarget.style.background=t.hover} onMouseLeave={(e)=>e.currentTarget.style.background='transparent'}>
                          <button onClick={()=>toggleTracker(tr.id,true)} className="flex items-center gap-2.5 flex-1 text-left">
                            <div className="w-5 h-5 rounded-md flex items-center justify-center flex-shrink-0" style={{background:checked?t.checked:'transparent',border:`1.5px solid ${checked?t.checked:t.panelBorder}`}}>
                              {checked && <span style={{color:t.checkedFg}}><Check size={13}/></span>}
                            </div>
                            <span style={{opacity:checked?1:0.85}}>{tr.label}</span>
                          </button>
                          <button onClick={()=>removeCustomTracker(tr.id)} className="opacity-0 group-hover:opacity-60 hover:!opacity-100" style={{color:t.textMuted}}><Trash size={13}/></button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          </div>
        ) : (
          <div className="grid grid-cols-1 lg:grid-cols-[1fr_2fr] gap-6">
            <div className="rounded-2xl p-5" style={{background:t.panel,border:`1px solid ${t.panelBorder}`,backdropFilter:theme==='outdoor'?'blur(8px)':'none'}}>
              <div className="text-xs uppercase tracking-wider mb-3" style={{color:t.textMuted}}>Últimos 14 días</div>
              <div className="space-y-1">
                {getRecentDates().map(d=>{
                  const e = entries[d];
                  const hasContent = e && (e.text || Object.values(e.trackers||{}).some(Boolean) || Object.values(e.customTrackers||{}).some(Boolean));
                  const dateObj = new Date(d+'T00:00:00');
                  const isCurrent = d === currentDate;
                  return (
                    <button key={d} onClick={()=>{setCurrentDate(d);setView('journal');}} className="w-full flex items-center justify-between px-3 py-2 rounded-lg text-sm" style={{background:isCurrent?t.hover:'transparent',color:t.text}} onMouseEnter={(ev)=>ev.currentTarget.style.background=t.hover} onMouseLeave={(ev)=>ev.currentTarget.style.background=isCurrent?t.hover:'transparent'}>
                      <div className="flex items-center gap-3">
                        <div className="w-2 h-2 rounded-full" style={{background:hasContent?t.accent:t.panelBorder}}/>
                        <div className="text-left"><div className="font-medium">{dateObj.toLocaleDateString('es',{weekday:'short',day:'numeric',month:'short'})}</div></div>
                      </div>
                      {e && <span className="text-base">{moodEmojis[(e.mood||3)-1]}</span>}
                    </button>
                  );
                })}
              </div>
            </div>
            <div className="rounded-2xl p-6" style={{background:t.panel,border:`1px solid ${t.panelBorder}`,backdropFilter:theme==='outdoor'?'blur(8px)':'none'}}>
              <div className="text-xs uppercase tracking-wider mb-4" style={{color:t.textMuted}}>Resumen de patrones</div>
              {Object.keys(entries).length === 0 ? (
                <div className="text-sm py-8 text-center" style={{color:t.textMuted}}>Todavía no hay entradas. ¡Empezá hoy!</div>
              ) : (
                <div className="space-y-5">
                  <div>
                    <div className="text-sm mb-2" style={{color:t.text}}>Estado emocional</div>
                    <div className="flex items-end gap-1 h-20">
                      {getRecentDates().reverse().map((d,i)=>{
                        const e = entries[d]; const mood = e?.mood||0;
                        return <div key={i} className="flex-1 rounded-t" style={{height:`${(mood/5)*100}%`,background:mood?t.accent:t.panelBorder,opacity:mood?0.4+(mood/5)*0.6:0.3,minHeight:'2px'}} title={`${d}: ${mood?moodEmojis[mood-1]:'sin entrada'}`}/>;
                      })}
                    </div>
                    <div className="flex justify-between text-xs mt-1.5" style={{color:t.textMuted}}><span>hace 14 días</span><span>hoy</span></div>
                  </div>
                  <div>
                    <div className="text-sm mb-3" style={{color:t.text}}>Hábitos en los últimos 14 días</div>
                    <div className="space-y-2">
                      {[...defaultTrackers,...customTrackers.map(c=>({...c,emoji:'✦'}))].map(tr=>{
                        const isCustom = tr.id.startsWith('custom_');
                        const count = getRecentDates().filter(d=>{const e=entries[d];return isCustom?e?.customTrackers?.[tr.id]:e?.trackers?.[tr.id];}).length;
                        return (
                          <div key={tr.id} className="flex items-center gap-3 text-sm">
                            <span className="text-base w-5">{tr.emoji}</span>
                            <div className="flex-1" style={{color:t.text}}>{tr.label}</div>
                            <div className="flex-1 max-w-[180px] h-1.5 rounded-full overflow-hidden" style={{background:t.panelBorder}}>
                              <div className="h-full rounded-full" style={{width:`${(count/14)*100}%`,background:t.accent}}/>
                            </div>
                            <div className="text-xs w-10 text-right" style={{color:t.textMuted}}>{count}/14</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        )}
        <div className="text-xs text-center mt-8 opacity-50" style={{color:t.textMuted}}>Tu journal se guarda automáticamente en este dispositivo</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Journal />);
</script>
</body>
</html>
