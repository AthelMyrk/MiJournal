<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="MurmurTether"/>
<meta name="theme-color" content="#0a0a0a"/>

<title>MurmurTether</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Lora:ital@0;1&family=DM+Mono&family=Caveat:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ═══════════════════════════════════════════════════════════
   MurmurTether — Y2K elegante
   Vidrio real, cromados sutiles, atmósfera viva
   ═══════════════════════════════════════════════════════════ */

:root{
  /* Glass tokens — noche */
  --glass-n-bg: rgba(14,18,28,0.55);
  --glass-n-bg-strong: rgba(14,18,28,0.78);
  --glass-n-border: rgba(255,255,255,0.10);
  --glass-n-highlight: rgba(255,255,255,0.18);
  --glass-n-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.06) inset;
  --text-n: rgba(232,232,236,0.92);
  --text-n-soft: rgba(232,232,236,0.55);
  --text-n-faint: rgba(232,232,236,0.32);

  /* Glass tokens — día */
  --glass-d-bg: rgba(255,255,255,0.42);
  --glass-d-bg-strong: rgba(252,250,245,0.82);
  --glass-d-border: rgba(255,255,255,0.55);
  --glass-d-highlight: rgba(255,255,255,0.85);
  --glass-d-shadow: 0 8px 32px rgba(40,60,80,0.18), 0 1px 0 rgba(255,255,255,0.6) inset;
  --text-d: rgba(28,32,40,0.88);
  --text-d-soft: rgba(28,32,40,0.5);
  --text-d-faint: rgba(28,32,40,0.3);

  /* Easing */
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-soft: cubic-bezier(0.4, 0.0, 0.2, 1);
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;width:100%;overflow:hidden;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Space Grotesk',system-ui,sans-serif;
  -webkit-text-size-adjust:100%;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ── Animations ──────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0;transform:scale(.96) translateY(4px);}to{opacity:1;transform:scale(1) translateY(0);}}
@keyframes flicker{0%,100%{opacity:.55;transform:scale(1);}50%{opacity:1;transform:scale(1.08);}}
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.02);}}
@keyframes drift{0%,100%{transform:translateX(0);}50%{transform:translateX(20px);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes twinkle{0%,100%{opacity:.3;}50%{opacity:1;}}
@keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}

.el-in{animation:fadeIn .5s var(--ease-out-expo) forwards;}
.candle{animation:flicker 2.4s ease-in-out infinite;display:inline-block;}

/* ── Form elements ───────────────────────────────────────── */
input[type=range]{-webkit-appearance:none;height:3px;border-radius:2px;outline:none;cursor:pointer;background:rgba(255,255,255,0.15);}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;cursor:pointer;background:#e8e8ec;box-shadow:0 0 0 1px rgba(0,0,0,.15),0 2px 6px rgba(0,0,0,.3);}
input[type=color]{-webkit-appearance:none;border:none;padding:0;cursor:pointer;border-radius:50%;overflow:hidden;background:none;width:28px;height:28px;}
input[type=color]::-webkit-color-swatch-wrapper{padding:0;}
input[type=color]::-webkit-color-swatch{border:1px solid rgba(255,255,255,.2);border-radius:50%;}
textarea{font-family:inherit;resize:none;outline:none;border:none;background:transparent;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px;}

/* ── Board ───────────────────────────────────────────────── */
.board{position:relative;width:100%;height:100%;overflow:hidden;transition:background .8s var(--ease-soft);}

/* ── Canvas system ───────────────────────────────────────── */
.canvas-viewport{
  position:absolute;left:0;right:0;top:0;bottom:0;overflow:hidden;
  cursor:grab;touch-action:none;
  z-index:1;
}
.canvas-viewport.panning{cursor:grabbing;}
.canvas-viewport.spacing{cursor:grab;}

/* El canvas real, transformado con pan/zoom */
.canvas-world{
  position:absolute;
  left:50%;top:50%;
  width:1px;height:1px;
  transform-origin:0 0;
  will-change:transform;
  overflow:visible;
}

/* Indicador de zoom flotante */
.zoom-indicator{
  position:absolute;bottom:max(28px,calc(env(safe-area-inset-bottom) + 16px));
  right:18px;z-index:50;
  display:flex;align-items:center;gap:6px;
  padding:6px 8px;border-radius:11px;
  background:var(--glass-n-bg);
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  border:1px solid var(--glass-n-border);
  box-shadow:0 4px 12px rgba(0,0,0,.3),0 1px 0 rgba(255,255,255,0.08) inset;
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--text-n-soft);letter-spacing:.05em;
  pointer-events:auto;
}
.zoom-indicator::before{
  content:'';position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.16) 50%,transparent);
  pointer-events:none;
}
.zoom-indicator.light{background:var(--glass-d-bg);border-color:var(--glass-d-border);color:var(--text-d-soft);}
.zoom-indicator button{
  background:none;border:none;color:inherit;cursor:pointer;
  width:22px;height:22px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s var(--ease-soft);
}
.zoom-indicator button:hover{background:rgba(255,255,255,.1);color:var(--text-n);}
.zoom-indicator.light button:hover{background:rgba(20,30,50,.08);color:var(--text-d);}
.zoom-value{min-width:42px;text-align:center;}

/* Botón centrar */
.center-btn{
  position:absolute;bottom:max(28px,calc(env(safe-area-inset-bottom) + 16px));
  left:18px;z-index:50;
  width:36px;height:36px;border-radius:11px;
  background:var(--glass-n-bg);
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  border:1px solid var(--glass-n-border);
  color:var(--text-n);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,0,0,.3),0 1px 0 rgba(255,255,255,0.08) inset;
  transition:all .25s var(--ease-soft);
}
.center-btn::before{
  content:'';position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18) 50%,transparent);
  pointer-events:none;border-radius:11px 11px 0 0;
}
.center-btn:hover{background:rgba(30,40,60,0.7);transform:translateY(-1px);}
.center-btn.light{background:var(--glass-d-bg);border-color:var(--glass-d-border);color:var(--text-d);}
.center-btn.light:hover{background:rgba(255,255,255,.65);}

/* ── Background SVG ──────────────────────────────────────── */
.bgsvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}

/* ── Board Elements ──────────────────────────────────────── */
.board-el{position:absolute;cursor:grab;user-select:none;transition:filter .3s var(--ease-soft);}
.board-el:hover{filter:brightness(1.03);z-index:100 !important;}
.board-el:active{cursor:grabbing;}

.del-btn{
  position:absolute;top:-10px;right:-10px;width:24px;height:24px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.4);cursor:pointer;
  display:none;align-items:center;justify-content:center;z-index:10;
  background:rgba(220,60,80,0.95);color:#fff;
  box-shadow:0 4px 12px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.1) inset;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:transform .2s var(--ease-soft);
}
.del-btn:hover{transform:scale(1.12);}
.board-el:hover .del-btn{display:flex;}

.resize-handle{
  position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;cursor:se-resize;
  opacity:0;transition:opacity .25s var(--ease-soft);
}
.board-el:hover .resize-handle{opacity:.6;}
.resize-handle::after{
  content:'';position:absolute;bottom:4px;right:4px;width:8px;height:8px;
  border-right:1.5px solid currentColor;border-bottom:1.5px solid currentColor;
}

/* ── Postit ──────────────────────────────────────────────── */
.postit{
  border-radius:2px;padding:18px 18px 14px;min-width:130px;position:relative;
  box-shadow:
    0 1px 1px rgba(0,0,0,0.08),
    0 4px 8px rgba(0,0,0,0.10),
    0 12px 24px rgba(0,0,0,0.14),
    0 1px 0 rgba(255,255,255,0.6) inset;
}
.postit::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,
    rgba(0,0,0,0.04) 0%,
    rgba(255,255,255,0.5) 30%,
    rgba(255,255,255,0.5) 70%,
    rgba(0,0,0,0.04) 100%);
}
.postit::after{
  content:'';position:absolute;top:0;right:0;width:18px;height:18px;
  background:linear-gradient(225deg,rgba(0,0,0,0.06) 0%,rgba(0,0,0,0) 50%);
  pointer-events:none;
}
.postit-author{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:11px;opacity:.42;margin-bottom:10px;letter-spacing:.02em;
}
.postit-text{font-size:14px;line-height:1.6;word-break:break-word;}
.postit-time{
  font-family:'DM Mono',monospace;font-size:10px;opacity:.42;
  margin-top:10px;text-align:right;letter-spacing:.05em;font-weight:500;
}

/* ── Sketch ──────────────────────────────────────────────── */
.sketch{
  background:#fafaf6;border-radius:2px;position:relative;overflow:hidden;
  box-shadow:
    0 1px 1px rgba(0,0,0,0.08),
    0 4px 10px rgba(0,0,0,0.12),
    0 14px 28px rgba(0,0,0,0.15);
}
.sketch.dark-sheet{background:#1a1c20;}
.sketch::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(0,0,0,0.025) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,0,0,0.02) 0%, transparent 40%);
}
.sketch-author{
  position:absolute;top:8px;left:12px;font-size:11px;opacity:.5;pointer-events:none;
  font-family:'Cormorant Garamond',serif;font-style:italic;
}
.sketch-time{
  position:absolute;bottom:8px;right:12px;font-size:10.5px;opacity:.5;pointer-events:none;
  font-family:'DM Mono',monospace;letter-spacing:.05em;font-weight:500;
  text-shadow:0 1px 2px rgba(0,0,0,0.3);
}
.sketch:not(.dark-sheet) .sketch-time{text-shadow:0 1px 2px rgba(255,255,255,0.6);}
.sketch img{display:block;width:100%;height:100%;}

/* ── Polaroid ────────────────────────────────────────────── */
.polaroid{
  background:#fdfcf7;border-radius:2px;display:flex;flex-direction:column;
  padding:10px 10px 0;
  box-shadow:
    0 1px 2px rgba(0,0,0,0.10),
    0 6px 14px rgba(0,0,0,0.14),
    0 18px 36px rgba(0,0,0,0.18),
    0 1px 0 rgba(255,255,255,0.9) inset;
}
.polaroid-img{
  flex:1;overflow:hidden;background:#000;
  box-shadow:0 0 0 1px rgba(0,0,0,0.08) inset;
}
.polaroid-img img{width:100%;height:100%;object-fit:cover;display:block;}
.polaroid-foot{padding:10px 4px 14px;background:transparent;}
.polaroid-caption{
  font-family:'Caveat',cursive;font-size:15px;color:#2a2a2a;
  text-align:center;border:none;outline:none;width:100%;background:transparent;
}
.polaroid-caption::placeholder{color:#bbb;}
.polaroid-meta{
  font-family:'DM Mono',monospace;font-size:10px;color:#777;
  text-align:right;margin-top:6px;letter-spacing:.06em;font-weight:500;
}

/* ═══════════════════════════════════════════════════════════
   Glass Surfaces — la firma visual
   ═══════════════════════════════════════════════════════════ */

.glass{
  background:var(--glass-n-bg);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--glass-n-border);
  box-shadow:var(--glass-n-shadow);
  position:relative;
}
.glass::before{
  content:'';position:absolute;top:0;left:8%;right:8%;height:1px;
  background:linear-gradient(90deg,transparent,var(--glass-n-highlight) 50%,transparent);
  pointer-events:none;
}
.glass.light{
  background:var(--glass-d-bg);
  border-color:var(--glass-d-border);
  box-shadow:var(--glass-d-shadow);
}
.glass.light::before{background:linear-gradient(90deg,transparent,var(--glass-d-highlight) 50%,transparent);}

.glass-strong{background:var(--glass-n-bg-strong);}
.glass-strong.light{background:var(--glass-d-bg-strong);}

/* ── Header ──────────────────────────────────────────────── */
.header{
  position:absolute;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;padding-top:max(14px,env(safe-area-inset-top));
  pointer-events:none;
}
.header > *{pointer-events:auto;}

.header-mark{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 1px 8px rgba(0,0,0,0.4)) drop-shadow(0 0 16px rgba(180,200,240,0.15));
  animation:breathe 6s ease-in-out infinite;
}
.header-mark-svg{width:32px;height:32px;color:#e8e4f0;}
.board[data-light="true"] .header-mark-svg{color:#1a2840;}
.board[data-light="true"] .header-mark{filter:drop-shadow(0 1px 8px rgba(255,255,255,0.5)) drop-shadow(0 0 12px rgba(100,120,160,0.2));}

.header-actions{display:flex;gap:8px;align-items:center;}

.hbtn{
  height:34px;min-width:34px;padding:0 12px;border-radius:11px;
  font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;
  display:flex;align-items:center;justify-content:center;gap:6px;
  background:var(--glass-n-bg);
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  border:1px solid var(--glass-n-border);
  color:var(--text-n);
  box-shadow:0 2px 8px rgba(0,0,0,.25),0 1px 0 rgba(255,255,255,0.08) inset;
  transition:all .25s var(--ease-soft);
  position:relative;
}
.hbtn::before{
  content:'';position:absolute;top:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18) 50%,transparent);
  pointer-events:none;border-radius:11px 11px 0 0;
}
.hbtn:hover{background:rgba(30,40,60,0.7);transform:translateY(-1px);}
.hbtn.active{background:rgba(255,255,255,.18);color:#fff;}
.hbtn.light{background:var(--glass-d-bg);border-color:var(--glass-d-border);color:var(--text-d);}
.hbtn.light:hover{background:rgba(255,255,255,.65);}
.hbtn.light.active{background:rgba(20,30,50,.12);color:rgba(20,30,50,.9);}

.hbtn-group{
  display:flex;border-radius:11px;overflow:hidden;
  border:1px solid var(--glass-n-border);
  background:var(--glass-n-bg);
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  box-shadow:0 2px 8px rgba(0,0,0,.25),0 1px 0 rgba(255,255,255,0.08) inset;
  position:relative;
}
.hbtn-group::before{
  content:'';position:absolute;top:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18) 50%,transparent);
  pointer-events:none;
}
.hbtn-group.light{background:var(--glass-d-bg);border-color:var(--glass-d-border);}
.hbtn-group .hbtn{
  border:none;border-radius:0;background:transparent;box-shadow:none;height:34px;width:38px;padding:0;
}
.hbtn-group .hbtn::before{display:none;}
.hbtn-group .hbtn.active{background:rgba(255,255,255,.16);}
.hbtn-group.light .hbtn.active{background:rgba(20,30,50,.10);}

.icon{width:14px;height:14px;stroke-width:1.5;stroke:currentColor;fill:none;flex-shrink:0;}
.icon-sm{width:12px;height:12px;}
.icon-lg{width:18px;height:18px;}

/* ── Daynav ──────────────────────────────────────────────── */
.daynav{
  position:absolute;top:max(60px,calc(env(safe-area-inset-top) + 60px));
  left:50%;transform:translateX(-50%);z-index:50;
  display:flex;align-items:center;gap:6px;
  padding:5px 8px;border-radius:13px;
  background:var(--glass-n-bg);
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  border:1px solid var(--glass-n-border);
  box-shadow:0 4px 12px rgba(0,0,0,.3),0 1px 0 rgba(255,255,255,0.08) inset;
}
.daynav::before{
  content:'';position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.16) 50%,transparent);
  pointer-events:none;
}
.daynav.light{background:var(--glass-d-bg);border-color:var(--glass-d-border);}
.daynav .day-label{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:14px;color:var(--text-n);min-width:130px;text-align:center;
  letter-spacing:.02em;
}
.daynav.light .day-label{color:var(--text-d);}
.daynav button{
  background:none;border:none;color:var(--text-n-soft);
  cursor:pointer;width:26px;height:26px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s var(--ease-soft);
}
.daynav button:hover:not(:disabled){background:rgba(255,255,255,.1);color:var(--text-n);}
.daynav button:disabled{opacity:.25;cursor:default;}
.daynav.light button{color:var(--text-d-soft);}
.daynav.light button:hover:not(:disabled){background:rgba(20,30,50,.08);color:var(--text-d);}

/* ── Toolbar ─────────────────────────────────────────────── */
.toolbar{
  position:absolute;
  bottom:max(28px,calc(env(safe-area-inset-bottom) + 16px));
  left:50%;transform:translateX(-50%);z-index:50;
  display:flex;align-items:center;gap:6px;
  padding:8px 10px;border-radius:18px;
  background:var(--glass-n-bg-strong);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid var(--glass-n-border);
  box-shadow:
    0 12px 32px rgba(0,0,0,.4),
    0 1px 0 rgba(255,255,255,.12) inset,
    0 -1px 0 rgba(0,0,0,.2) inset;
}
.toolbar::before{
  content:'';position:absolute;top:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22) 50%,transparent);
  pointer-events:none;border-radius:18px 18px 0 0;
}
.toolbar.light{background:var(--glass-d-bg-strong);border-color:var(--glass-d-border);}

.tbtn{
  width:42px;height:42px;border-radius:13px;
  border:1px solid rgba(255,255,255,.1);background:transparent;
  color:var(--text-n);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s var(--ease-soft);font-family:inherit;
  position:relative;
}
.tbtn:hover{background:rgba(255,255,255,.12);transform:translateY(-2px);}

    res(canvas.toDataURL('image/jpeg',.72));
  };
  img.src=src;
});

// ═══════════════════════════════════════════════════════════
// Draw Sheet Modal
// ═══════════════════════════════════════════════════════════
function DrawModal({onSave,onCancel,isDark}){
  const ref=useRef(null);
  const [tool,setTool]=useState('pen');
  const [color,setColor]=useState(isDark?'#e8e8ec':'#1a1a1a');
  const [sz,setSz]=useState(3);
  const drawing=useRef(false);
  const last=useRef(null);

  useEffect(()=>{
    const c=ref.current,ctx=c.getContext('2d');
    ctx.fillStyle=isDark?'#1a1c20':'#fafaf6';
    ctx.fillRect(0,0,c.width,c.height);
  },[]);

  const getPos=(e,c)=>{
    const r=c.getBoundingClientRect();
    const s=e.touches?e.touches[0]:e;
    return{x:(s.clientX-r.left)*(c.width/r.width),y:(s.clientY-r.top)*(c.height/r.height)};
  };
  const spray=(ctx,p)=>{
    ctx.fillStyle=color;
    for(let i=0;i<18;i++){const r=sz*4,x=p.x+(Math.random()-.5)*r*2,y=p.y+(Math.random()-.5)*r*2;if(Math.hypot(x-p.x,y-p.y)<r)ctx.fillRect(x,y,1.5,1.5);}
  };
  const onDown=e=>{e.preventDefault();drawing.current=true;const c=ref.current,p=getPos(e,c);last.current=p;if(tool==='spray')spray(c.getContext('2d'),p);};
  const onMove=e=>{
    if(!drawing.current)return;e.preventDefault();
    const c=ref.current,ctx=c.getContext('2d'),p=getPos(e,c);
    if(tool==='pen'||tool==='eraser'){
      ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);
      ctx.strokeStyle=tool==='eraser'?(isDark?'#1a1c20':'#fafaf6'):color;
      ctx.lineWidth=tool==='eraser'?sz*4:sz;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();last.current=p;
    }else if(tool==='spray'){spray(ctx,p);last.current=p;}
  };
  const onUp=e=>{
    if(!drawing.current)return;e.preventDefault();
    const c=ref.current,ctx=c.getContext('2d'),p=getPos(e,c),l=last.current;
    if(tool==='rect'){ctx.strokeStyle=color;ctx.lineWidth=sz;ctx.strokeRect(l.x,l.y,p.x-l.x,p.y-l.y);}
    else if(tool==='line'){ctx.beginPath();ctx.moveTo(l.x,l.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle=color;ctx.lineWidth=sz;ctx.lineCap='round';ctx.stroke();}
    else if(tool==='circle'){const rx=Math.abs(p.x-l.x)/2,ry=Math.abs(p.y-l.y)/2;ctx.strokeStyle=color;ctx.lineWidth=sz;ctx.beginPath();ctx.ellipse(l.x+(p.x>l.x?rx:-rx),l.y+(p.y>l.y?ry:-ry),rx,ry,0,0,Math.PI*2);ctx.stroke();}
    drawing.current=false;
  };

  const TOOLS=[
    {id:'pen',I:Icon.Pencil},
    {id:'eraser',I:Icon.Eraser},
    {id:'spray',I:Icon.Spray},
    {id:'line',I:Icon.Line},
    {id:'rect',I:Icon.Rect},
    {id:'circle',I:Icon.Circle},
  ];

  return(
    <div className="overlay">
      <div className="modal" style={{maxWidth:540}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <h3>Nueva hoja</h3>
          <button className="modal-close" onClick={onCancel}><Icon.X/></button>
        </div>
        <div className="dtoolbar">
          <div style={{display:'flex',gap:4}}>
            {TOOLS.map(({id,I})=>(
              <button key={id} className={`dtool${tool===id?' active':''}`} onClick={()=>setTool(id)}>
                <I className="icon"/>
              </button>
            ))}
          </div>
          <input type="color" value={color} onChange={e=>setColor(e.target.value)}/>
          <div style={{display:'flex',alignItems:'center',gap:10,flex:1}}>
            <span style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontSize:13,color:'rgba(255,255,255,.5)',whiteSpace:'nowrap'}}>grosor</span>
            <input type="range" min="1" max="18" value={sz} onChange={e=>setSz(+e.target.value)} style={{flex:1}}/>
          </div>
        </div>
        <canvas ref={ref} width={480} height={300}
          style={{width:'100%',borderRadius:10,border:'1px solid rgba(255,255,255,.08)',cursor:tool==='eraser'?'cell':'crosshair',touchAction:'none',display:'block',boxShadow:'inset 0 1px 2px rgba(0,0,0,0.3)'}}
          onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
          onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}/>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="mbtn" onClick={onCancel}>Cancelar</button>
          <button className="mbtn primary" onClick={()=>{
            const c=ref.current;
            const tmp=document.createElement('canvas');
            tmp.width=400;tmp.height=Math.round(400*(c.height/c.width));
            tmp.getContext('2d').drawImage(c,0,0,tmp.width,tmp.height);
            onSave(tmp.toDataURL('image/jpeg',0.78));
          }}>Poner en tablón</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// Board Element — coordenadas en píxeles reales del canvas
// ═══════════════════════════════════════════════════════════
function BoardEl({el,myId,onMove,onDelete,onUpdateCaption,onPress,scale,onDragActive}){
  const elRef=useRef(null);
  const dragStart=useRef(null);
  const resizeStart=useRef(null);

  const startDrag=useCallback((e)=>{
    if(e.target.closest('.resize-handle')||e.target.closest('.del-btn')||e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    if(e.touches&&e.touches.length>1)return;
    e.preventDefault();
    e.stopPropagation();
    onPress&&onPress(el.id);
    onDragActive&&onDragActive(true);
    const s=e.touches?e.touches[0]:e;
    dragStart.current={mx:s.clientX,my:s.clientY,ex:el.x,ey:el.y};
    const move=ev=>{
      if(ev.touches&&ev.touches.length>1)return;
      const m=ev.touches?ev.touches[0]:ev;
      const dx=(m.clientX-dragStart.current.mx)/scale;
      const dy=(m.clientY-dragStart.current.my)/scale;
      onMove(el.id,Math.round(dragStart.current.ex+dx),Math.round(dragStart.current.ey+dy));
    };
    const up=()=>{
      onDragActive&&onDragActive(false);
      document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);
      document.removeEventListener('touchmove',move);document.removeEventListener('touchend',up);
    };
    document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
    document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',up);
  },[el,onMove,scale,onPress,onDragActive]);

  const startResize=useCallback((e)=>{
    e.preventDefault();e.stopPropagation();
    if(e.touches&&e.touches.length>1)return;
    const s=e.touches?e.touches[0]:e;
    resizeStart.current={mx:s.clientX,my:s.clientY,w:el.w||200,h:el.h||200};
    const move=ev=>{
      if(ev.touches&&ev.touches.length>1)return;
      const m=ev.touches?ev.touches[0]:ev;
      const dx=(m.clientX-resizeStart.current.mx)/scale;
      const dy=(m.clientY-resizeStart.current.my)/scale;
      const nw=Math.max(120,resizeStart.current.w+dx),nh=Math.max(100,resizeStart.current.h+dy);
      onMove(el.id,el.x,el.y,nw,nh);
    };
    const up=()=>{document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);document.removeEventListener('touchmove',move);document.removeEventListener('touchend',up);};
    document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
    document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',up);
  },[el,onMove,scale]);

  const rot=el.rot||0;
  const style={left:el.x,top:el.y,transform:`rotate(${rot}deg)`,zIndex:el.z||1};

  if(el.type==='postit'){
    const nc=PCOLORS.find(c=>c.id===el.color)||PCOLORS[0];
    const font=FONTS.find(f=>f.id===el.font)||FONTS[4];
    const w=el.w||220,h=el.h||null;
    return(
      <div ref={elRef} className="board-el el-in" style={style}
        onMouseDown={startDrag} onTouchStart={startDrag}>
        <button className="del-btn" onClick={()=>onDelete(el.id)}><Icon.X className="icon-sm"/></button>
        <div className="postit" style={{background:nc.v,fontFamily:font.css,width:w,height:h||'auto',overflow:'hidden'}}>
          <div className="postit-author">— {el.author_name}</div>
          <div className="postit-text" style={{fontSize:el.font==='caveat'?'1.15rem':'13.5px',fontStyle:['cormorant','lora'].includes(el.font)?'italic':'normal'}}>
            {el.content}
          </div>
          <div className="postit-time">{new Date(el.created_at).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <div className="resize-handle" onMouseDown={startResize} onTouchStart={startResize}
          style={{color:'rgba(0,0,0,.4)'}}/>
      </div>
    );
  }

  if(el.type==='sketch'){
    const w=el.w||240,h=el.h||180;
    return(
      <div ref={elRef} className="board-el el-in" style={style}
        onMouseDown={startDrag} onTouchStart={startDrag}>
        <button className="del-btn" onClick={()=>onDelete(el.id)}><Icon.X className="icon-sm"/></button>
        <div className={`sketch${getIsDark()?' dark-sheet':''}`} style={{width:w,height:h}}>
          <div className="sketch-author">— {el.author_name}</div>
          <img src={el.content} alt="" style={{objectFit:'contain'}}/>
          <div className="sketch-time">{new Date(el.created_at).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <div className="resize-handle" onMouseDown={startResize} onTouchStart={startResize}
          style={{color:'rgba(0,0,0,.4)'}}/>
      </div>
    );
  }

  if(el.type==='polaroid'){
    const w=el.w||190,imgH=Math.round(w*.95);
    return(
      <div ref={elRef} className="board-el el-in" style={style}
        onMouseDown={startDrag} onTouchStart={startDrag}>
        <button className="del-btn" onClick={()=>onDelete(el.id)}><Icon.X className="icon-sm"/></button>
        <div className="polaroid" style={{width:w}}>
          <div className="polaroid-img" style={{height:imgH}}>
            <img src={el.content} alt=""/>
          </div>
          <div className="polaroid-foot">
            <input className="polaroid-caption" defaultValue={el.caption||''} placeholder="..."
              onBlur={e=>onUpdateCaption(el.id,e.target.value)}
              onMouseDown={e=>e.stopPropagation()} onTouchStart={e=>e.stopPropagation()}/>
            <div className="polaroid-meta">{el.author_name} · {new Date(el.created_at).toLocaleDateString('es',{day:'numeric',month:'short'})}</div>
          </div>
        </div>
        <div className="resize-handle" onMouseDown={startResize} onTouchStart={startResize}
          style={{color:'rgba(0,0,0,.3)'}}/>
      </div>
    );
  }
  return null;
}

// ═══════════════════════════════════════════════════════════
// Onboarding
// ═══════════════════════════════════════════════════════════
function Onboarding({onDone}){
  const [step,setStep]=useState('choice');
  const [name,setName]=useState('');
  const [code,setCode]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');

  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const room=params.get('room');
    if(room){setCode(room);setStep('join');}
  },[]);

  const create=async()=>{
    if(!name.trim())return setErr('Ponete un apodo primero');
    setLoading(true);setErr('');
    const roomId='mt_'+Math.random().toString(36).slice(2,9);
    const userId='u_'+Math.random().toString(36).slice(2)+Date.now().toString(36);
    const{error}=await sb.from('murmur_rooms').insert({id:roomId,created_by:userId,members:[{id:userId,name:name.trim()}]});
    if(error){setErr('Error al crear sala.');setLoading(false);return;}
    ls.set('userId',userId);ls.set('userName',name.trim());ls.set('roomId',roomId);
    onDone({userId,userName:name.trim(),roomId});
  };

  const join=async()=>{
    if(!name.trim())return setErr('Ponete un apodo primero');
    if(!code.trim())return setErr('Pegá el link o código');
    setLoading(true);setErr('');
    const roomId=code.trim().includes('room=')?new URLSearchParams(code.trim().split('?')[1]).get('room'):code.trim();
    const{data,error}=await sb.from('murmur_rooms').select('*').eq('id',roomId).single();
    if(error||!data){setErr('Sala no encontrada.');setLoading(false);return;}
    const userId='u_'+Math.random().toString(36).slice(2)+Date.now().toString(36);
    await sb.from('murmur_rooms').update({members:[...(data.members||[]),{id:userId,name:name.trim()}]}).eq('id',roomId);
    ls.set('userId',userId);ls.set('userName',name.trim());ls.set('roomId',roomId);
    onDone({userId,userName:name.trim(),roomId});
  };

  const isDark=getIsDark();
  return(
    <div className="onboard" style={{background:isDark?'#03050a':'#cae5f0'}}>
      <OutdoorBg isDark={isDark}/>
      <div className={`ocard${!isDark?' light':''}`}>
        <div className="obrand">
          <div className="obrand-mark"><Icon.Logo className="icon-lg" style={{color:isDark?'#e8e4f0':'#1a2840'}}/></div>
          <div className="otitle">MurmurTether</div>
          <div className="osub">un tablón para los dos</div>
        </div>
        {step==='choice'&&(
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <button className="obtn primary" onClick={()=>setStep('create')}>Crear tablón nuevo</button>
            <button className="obtn" onClick={()=>setStep('join')}>Unirme con un link</button>
          </div>
        )}
        {(step==='create'||step==='join')&&(
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div>
              <label className="olabel">Tu apodo</label>
              <input className="oinput" value={name} onChange={e=>setName(e.target.value)} placeholder="¿cómo te llaman acá?" autoFocus/>
            </div>
            {step==='join'&&(
              <div>
                <label className="olabel">Link de invitación</label>
                <input className="oinput" value={code} onChange={e=>setCode(e.target.value)} placeholder="pegá el link aquí"/>
              </div>
            )}
            {err&&<p className="oerr">{err}</p>}
            <button className="obtn primary" onClick={step==='create'?create:join} disabled={loading} style={{opacity:loading?.6:1}}>
              {loading?'un momento...':(step==='create'?'Crear tablón':'Entrar')}
            </button>
            <button className="oback" onClick={()=>{setStep('choice');setErr('');}}>← volver</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// Main App — canvas navegable
// ═══════════════════════════════════════════════════════════
const MIN_ZOOM=0.25, MAX_ZOOM=2.0, ZOOM_STEP=0.15;

function App(){
  const [session,setSession]=useState(null);
  const [elements,setElements]=useState([]);
  const [ready,setReady]=useState(false);
  const [currentDay,setCurrentDay]=useState(todayStr());
  const [isDark,setIsDark]=useState(getIsDark());
  const [manual,setManual]=useState(null);
  const [showPostit,setShowPostit]=useState(false);
  const [showDraw,setShowDraw]=useState(false);
  const [showInvite,setShowInvite]=useState(false);
  const [inviteUrl,setInviteUrl]=useState('');
  const [isFullscreen,setIsFullscreen]=useState(false);

  // Viewport: tx/ty es el offset del canvas-world dentro del viewport, scale es zoom
  const [viewport,setViewport]=useState(()=>{
    const saved=ls.get('viewport_'+ls.get('roomId'));
    return saved||{tx:0,ty:0,scale:1};
  });
  const [isPanning,setIsPanning]=useState(false);
  const [spaceDown,setSpaceDown]=useState(false);

  const viewportRef=useRef(null);
  const fileRef=useRef(null);
  const filterCanvas=useRef(document.createElement('canvas'));
  const dark=manual?manual==='night':isDark;
  const viewportRefState=useRef(viewport);
  useEffect(()=>{viewportRefState.current=viewport;},[viewport]);

  const toggleFullscreen=async()=>{
    try{
      if(!document.fullscreenElement&&!document.webkitFullscreenElement){
        const el=document.documentElement;
        if(el.requestFullscreen)await el.requestFullscreen();
        else if(el.webkitRequestFullscreen)await el.webkitRequestFullscreen();
      }else{
        if(document.exitFullscreen)await document.exitFullscreen();
        else if(document.webkitExitFullscreen)await document.webkitExitFullscreen();
      }
    }catch(e){console.warn('Fullscreen error:',e);}
  };

  useEffect(()=>{
    const onFs=()=>setIsFullscreen(!!(document.fullscreenElement||document.webkitFullscreenElement));
    document.addEventListener('fullscreenchange',onFs);
    document.addEventListener('webkitfullscreenchange',onFs);
    return()=>{document.removeEventListener('fullscreenchange',onFs);document.removeEventListener('webkitfullscreenchange',onFs);};
  },[]);

  useEffect(()=>{
    const i=setInterval(()=>setIsDark(getIsDark()),60000);
    return()=>clearInterval(i);
  },[]);

  useEffect(()=>{
    const s={userId:ls.get('userId'),userName:ls.get('userName'),roomId:ls.get('roomId')};
    if(s.userId&&s.roomId)setSession(s);
    else setReady(true);
  },[]);

  // Persistir viewport por sala con throttle
  useEffect(()=>{
    if(!session)return;
    const t=setTimeout(()=>{
      ls.set('viewport_'+session.roomId,viewport);
    },300);
    return()=>clearTimeout(t);
  },[viewport,session]);

  // Cargar viewport guardado al iniciar sesión
  useEffect(()=>{
    if(!session)return;
    const saved=ls.get('viewport_'+session.roomId);
    if(saved&&typeof saved.scale==='number'){
      setViewport(saved);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[session?.roomId]);

  // Space key para pan en desktop
  useEffect(()=>{
    const down=(e)=>{
      if(e.code==='Space'&&!e.repeat&&document.activeElement?.tagName!=='INPUT'&&document.activeElement?.tagName!=='TEXTAREA'){
        e.preventDefault();setSpaceDown(true);
      }
    };
    const up=(e)=>{if(e.code==='Space'){setSpaceDown(false);}};
    window.addEventListener('keydown',down);
    window.addEventListener('keyup',up);
    return()=>{window.removeEventListener('keydown',down);window.removeEventListener('keyup',up);};
  },[]);

  // Cargar elementos del día actual
  useEffect(()=>{
    if(!session)return;
    const loadElements=()=>{
      sb.from('murmur_notes')
        .select('*')
        .eq('room_id',session.roomId)
        .gte('created_at',currentDay+'T00:00:00')
        .lte('created_at',currentDay+'T23:59:59')
        .then(({data})=>{
          if(data){
            // Migración: si las coordenadas están en rango 0-1000 (viejas normalizadas),
            // convertirlas a píxeles centrados. Si ya son píxeles reales (pueden ser negativas), dejarlas.
            const migrated=data.map(el=>{
              if(el.x>=0&&el.x<=1000&&el.y>=0&&el.y<=1000&&!el._migrated){
                // Convertir 0-1000 normalizado a px centrado en (0,0)
                // 500,400 era el centro original — eso ahora es (0,0)
                return{...el,x:Math.round((el.x-500)*1.6),y:Math.round((el.y-400)*1.6)};
              }
              return el;
            });
            setElements(migrated);
          }
          setReady(true);
        });
    };
    loadElements();
    const pollInterval=setInterval(loadElements,4000);

    const ch=sb.channel('board_'+session.roomId+'_'+currentDay)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'murmur_notes',filter:`room_id=eq.${session.roomId}`},
        p=>{if(p.new.created_at?.startsWith(currentDay))setElements(prev=>prev.find(e=>e.id===p.new.id)?prev:[...prev,p.new]);})
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'murmur_notes',filter:`room_id=eq.${session.roomId}`},
        p=>{if(p.new.created_at?.startsWith(currentDay))setElements(prev=>prev.map(e=>e.id===p.new.id?p.new:e));})
      .on('postgres_changes',{event:'DELETE',schema:'public',table:'murmur_notes',filter:`room_id=eq.${session.roomId}`},
        p=>{setElements(prev=>prev.filter(e=>e.id!==p.old.id));})
      .subscribe();
    return()=>{clearInterval(pollInterval);sb.removeChannel(ch);};
  },[session,currentDay]);

  // ═══════════════════════════════════════════════════════════
  // Pan & Zoom — motor con refs puros, sin closures stale
  // ═══════════════════════════════════════════════════════════
  const draggingEl=useRef(false);
  const elDragActive=useCallback((v)=>{draggingEl.current=v;},[]);

  // Todos los handlers leen viewportRefState.current — nunca stale
  useEffect(()=>{
    const v=viewportRef.current;if(!v)return;

    const g={panning:false,pinching:false,panStart:null,pinchStart:null};

    const getVP=()=>viewportRefState.current;
    const setVP=(next)=>setViewport(next);

    // ── Wheel ──
    const onWheel=(e)=>{
      e.preventDefault();
      const vp=getVP();
      const delta=-e.deltaY*(e.deltaMode===1?0.05:0.0012);
      const ns=Math.max(MIN_ZOOM,Math.min(MAX_ZOOM,vp.scale*(1+delta)));
      if(Math.abs(ns-vp.scale)<0.001)return;
      const r=v.getBoundingClientRect();
      const cx=e.clientX-r.left-r.width/2;
      const cy=e.clientY-r.top-r.height/2;
      const ratio=ns/vp.scale;
      setVP({tx:cx-(cx-vp.tx)*ratio,ty:cy-(cy-vp.ty)*ratio,scale:ns});
    };

    // ── Pointer down ──
    const onDown=(e)=>{
      if(e.touches){
        if(e.touches.length===2){
          e.preventDefault();
          const t1=e.touches[0],t2=e.touches[1];
          g.pinching=true;g.panning=false;
          g.pinchStart={
            dist:Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY),
            cx:(t1.clientX+t2.clientX)/2,cy:(t1.clientY+t2.clientY)/2,
            vp:{...getVP()}
          };
          return;
        }
        if(e.touches.length===1&&!draggingEl.current){
          e.preventDefault();
          g.panning=true;
          g.panStart={cx:e.touches[0].clientX,cy:e.touches[0].clientY,...getVP()};
          setIsPanning(true);
        }
      } else {
        const onEl=!!e.target.closest('.board-el');
        // Pan: botón medio, o izquierdo sin estar sobre elemento
        if(e.button===1||(e.button===0&&!onEl)){
          e.preventDefault();
          g.panning=true;
          g.panStart={cx:e.clientX,cy:e.clientY,...getVP()};
          setIsPanning(true);
        }
      }
    };

    // ── Pointer move ──
    const onMove=(e)=>{
      if(g.pinching&&e.touches&&e.touches.length===2){
        e.preventDefault();
        const t1=e.touches[0],t2=e.touches[1];
        const dist=Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY);
        const cx=(t1.clientX+t2.clientX)/2,cy=(t1.clientY+t2.clientY)/2;
        const s=g.pinchStart;
        const ns=Math.max(MIN_ZOOM,Math.min(MAX_ZOOM,s.vp.scale*(dist/s.dist)));
        const r=v.getBoundingClientRect();
        const px=s.cx-r.left-r.width/2,py=s.cy-r.top-r.height/2;
        const ratio=ns/s.vp.scale;
        setVP({tx:px-(px-s.vp.tx)*ratio+(cx-s.cx),ty:py-(py-s.vp.ty)*ratio+(cy-s.cy),scale:ns});
        return;
      }
      if(g.panning&&!draggingEl.current){
        const p=e.touches?e.touches[0]:e;
        const s=g.panStart;if(!s)return;
        setVP(cur=>({...cur,tx:s.tx+(p.clientX-s.cx),ty:s.ty+(p.clientY-s.cy)}));
      }
    };

    // ── Pointer up ──
    const onUp=(e)=>{
      if(g.pinching&&(!e.touches||e.touches.length<2)){
        g.pinching=false;
        if(e.touches&&e.touches.length===1){
          g.panning=true;
          g.panStart={cx:e.touches[0].clientX,cy:e.touches[0].clientY,...getVP()};
          return;
        }
      }
      if(g.panning&&(!e.touches||e.touches.length===0)){
        g.panning=false;setIsPanning(false);
      }
    };

    v.addEventListener('wheel',onWheel,{passive:false});
    v.addEventListener('mousedown',onDown);
    v.addEventListener('touchstart',onDown,{passive:false});
    document.addEventListener('mousemove',onMove,{passive:false});
    document.addEventListener('touchmove',onMove,{passive:false});
    document.addEventListener('mouseup',onUp);
    document.addEventListener('touchend',onUp);
    return()=>{
      v.removeEventListener('wheel',onWheel);
      v.removeEventListener('mousedown',onDown);
      v.removeEventListener('touchstart',onDown);
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('touchmove',onMove);
      document.removeEventListener('mouseup',onUp);
      document.removeEventListener('touchend',onUp);
    };
  // Solo corre una vez — todos los datos vienen de refs, no de closures
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  // Zoom buttons
  const zoomIn=()=>{
    const vp=viewportRefState.current;
    const newScale=Math.min(MAX_ZOOM,vp.scale*(1+ZOOM_STEP));
    setViewport({...vp,scale:newScale});
  };
  const zoomOut=()=>{
    const vp=viewportRefState.current;
    const newScale=Math.max(MIN_ZOOM,vp.scale*(1-ZOOM_STEP));
    setViewport({...vp,scale:newScale});
  };
  const centerView=()=>{
    setViewport({tx:0,ty:0,scale:1});
  };

  // ═══════════════════════════════════════════════════════════
  // Element actions
  // ═══════════════════════════════════════════════════════════

  const addElement=async(data)=>{
    if(!session)return;
    // Posición: en el centro del viewport actual del usuario, en world coords
    const vp=viewportRefState.current;
    const wx=Math.round(-vp.tx/vp.scale);
    const wy=Math.round(-vp.ty/vp.scale);
    const jitter=80;
    const el={
      room_id:session.roomId,author_id:session.userId,author_name:session.userName,
      x:wx+Math.round((Math.random()-.5)*jitter),
      y:wy+Math.round((Math.random()-.5)*jitter),
      rot:randRot(),z:Date.now(),...data,
      created_at:new Date().toISOString(),
    };
    await sb.from('murmur_notes').insert(el);
  };

  const moveElement=useCallback(async(id,x,y,w,h)=>{
    const upd={x,y};if(w!==undefined)upd.w=w;if(h!==undefined)upd.h=h;
    setElements(prev=>prev.map(e=>e.id===id?{...e,...upd}:e));
    await sb.from('murmur_notes').update(upd).eq('id',id);
  },[]);

  const pressElement=useCallback(async(id)=>{
    // Bring to front (z-index = now)
    const z=Date.now();
    setElements(prev=>prev.map(e=>e.id===id?{...e,z}:e));
    sb.from('murmur_notes').update({z}).eq('id',id);
  },[]);

  const deleteElement=async(id)=>{
    await sb.from('murmur_notes').delete().eq('id',id);
    setElements(prev=>prev.filter(e=>e.id!==id));
  };

  const updateCaption=async(id,caption)=>{
    await sb.from('murmur_notes').update({caption}).eq('id',id);
  };

  const handlePhoto=async e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=async ev=>{
      const filtered=await applyY2K(filterCanvas.current,ev.target.result);
      await addElement({type:'polaroid',content:filtered,w:190,caption:''});
    };
    r.readAsDataURL(file);e.target.value='';
  };

  const changeDay=delta=>{
    const d=new Date(currentDay+'T12:00:00');d.setDate(d.getDate()+delta);
    setCurrentDay(d.toISOString().split('T')[0]);
  };

  const getInvite=async()=>{
    const url=`${window.location.origin}${window.location.pathname}?room=${session.roomId}`;
    setInviteUrl(url);setShowInvite(true);
    try{await navigator.clipboard.writeText(url);}catch{}
  };

  if(!ready&&!session)return null;
  if(!session)return <Onboarding onDone={s=>setSession(s)}/>;

  const isToday=currentDay===todayStr();
  const lightCls=dark?'':' light';
  const zoomPct=Math.round(viewport.scale*100);

  return(
    <div className="board" data-light={!dark} style={{background:dark?'#03050a':'#cae5f0'}}>
      <OutdoorBg isDark={dark}/>

      {/* Invite modal */}
      {showInvite&&(
        <div className="overlay">
          <div className="modal">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <h3>Compartí el tablón</h3>
              <button className="modal-close" onClick={()=>setShowInvite(false)}><Icon.X/></button>
            </div>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:'italic',fontSize:14,color:'rgba(232,232,236,.55)',letterSpacing:'.01em'}}>
              Enviá este link. Solo hace falta abrirlo y elegir un apodo.
            </p>
            <div className="iurl">{inviteUrl}</div>
            <p style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'rgba(232,232,236,.4)',textAlign:'center',letterSpacing:'.05em'}}>copiado al portapapeles ✓</p>
            <button className="mbtn primary" onClick={()=>setShowInvite(false)}>listo</button>
          </div>
        </div>
      )}

      {/* Modals */}
      {showPostit&&<PostitModal isDark={dark} onCancel={()=>setShowPostit(false)}
        onSave={async d=>{await addElement({type:'postit',content:d.text,font:d.font,color:d.color});setShowPostit(false);}}/>}
      {showDraw&&<DrawModal isDark={dark} onCancel={()=>setShowDraw(false)}
        onSave={async dataUrl=>{await addElement({type:'sketch',content:dataUrl,w:240,h:180});setShowDraw(false);}}/>}

      {/* Header */}
      <div className="header">
        <div className="header-mark"><Icon.Logo className="header-mark-svg"/></div>
        <div className="header-actions">
          <button className={`hbtn${lightCls}`} onClick={toggleFullscreen} title="Pantalla completa">
            {isFullscreen?<Icon.Minimize/>:<Icon.Maximize/>}
          </button>
          <div className={`hbtn-group${lightCls}`}>
            <button className={`hbtn${manual==='day'?' active':''}${lightCls}`} onClick={()=>setManual(manual==='day'?null:'day')} title="Día"><Icon.Sun/></button>
            <button className={`hbtn${manual==='night'?' active':''}${lightCls}`} onClick={()=>setManual(manual==='night'?null:'night')} title="Noche"><Icon.Moon/></button>
          </div>
          <button className={`hbtn${lightCls}`} onClick={getInvite}><Icon.Plus className="icon-sm"/>invitar</button>
        </div>
      </div>

      {/* Day navigator */}
      <div className={`daynav${lightCls}`}>
        <button onClick={()=>changeDay(-1)}><Icon.ChevronLeft className="icon-sm"/></button>
        <span className="day-label">{currentDay===todayStr()?'hoy':fmtDate(currentDay)}</span>
        <button onClick={()=>changeDay(1)} disabled={isToday}><Icon.ChevronRight className="icon-sm"/></button>
      </div>

      {/* Canvas viewport - el contenedor que captura gestos */}
      <div
        ref={viewportRef}
        className={`canvas-viewport${isPanning?' panning':''}${spaceDown?' spacing':''}`}
      >
        {/* Canvas world - se transforma con pan/zoom */}
        <div
          className="canvas-world"
          style={{transform:`translate(${viewport.tx}px, ${viewport.ty}px) scale(${viewport.scale})`}}
        >
          {elements.map(el=>(
            <BoardEl key={el.id} el={el} myId={session.userId}
              onMove={moveElement} onDelete={deleteElement}
              onUpdateCaption={updateCaption} onPress={pressElement}
              scale={viewport.scale} onDragActive={elDragActive}/>
          ))}
        </div>

        {/* Empty state — fixed in viewport, no en world */}
        {elements.length===0&&ready&&(
          <div className="empty-state">
            <div className="empty-mark">
              <Icon.Logo className="empty-glyph" style={{color:dark?'#e8e4f0':'#1a2840'}}/>
              <p className={`empty-text${lightCls}`}>
                {isToday?'el tablón te espera...':'sin recuerdos este día'}
              </p>
            </div>
          </div>
        )}
      </div>

      {/* Center button */}
      <button className={`center-btn${lightCls}`} onClick={centerView} title="Centrar">
        <svg className="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v4M12 18v4M2 12h4M18 12h4" strokeLinecap="round"/>
        </svg>
      </button>

      {/* Zoom indicator */}
      <div className={`zoom-indicator${lightCls}`}>
        <button onClick={zoomOut} title="Zoom out"><Icon.X className="icon-sm" style={{transform:'rotate(45deg)'}}/></button>
        <span className="zoom-value">{zoomPct}%</span>
        <button onClick={zoomIn} title="Zoom in"><Icon.Plus className="icon-sm"/></button>
      </div>

      {/* Toolbar */}
      <div className={`toolbar${lightCls}`}>
        <span className="tbtn-label">añadir</span>
        <button className="tbtn" title="Post-it" onClick={()=>setShowPostit(true)}><Icon.Note/></button>
        <button className="tbtn" title="Dibujo" onClick={()=>setShowDraw(true)}><Icon.Pencil/></button>
        <button className="tbtn" title="Foto polaroid" onClick={()=>fileRef.current?.click()}><Icon.Camera/></button>
        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handlePhoto}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
